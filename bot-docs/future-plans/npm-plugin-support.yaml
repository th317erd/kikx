# npm Package Plugin Support
# Deferred from: Phase 4 (Commands + Plugin Hardening)
# Priority: Low
# Complexity: Medium

summary: >
  Resolve plugins from node_modules in addition to the plugins directory.
  Users can `npm install kikx-plugin-foo` and it auto-discovers on restart.

current_state: >
  Plugins are discovered from two directories: internal (server/plugins/)
  and user (configurable plugins dir). Both use filesystem scanning.
  There is no node_modules resolution path.

requirements:
  - Scan package.json dependencies for packages with kikx-plugin-* prefix
  - Resolve via require.resolve() / import.meta.resolve()
  - Same plugin API shape as filesystem plugins
  - Source tracking: 'npm' in addition to 'internal' and 'user'
  - Version conflict detection (npm plugin vs filesystem plugin same name)
  - Plugin priority: user filesystem > npm > internal

design_notes: >
  The plugin loader already handles dual discovery with override logic.
  Adding a third source (npm) fits the existing pattern. The tricky part
  is dependency resolution across sources — an npm plugin might depend
  on an internal plugin or vice versa. The topological sort already
  handles this but needs cross-source awareness.

files:
  - server/lib/plugins/discovery.mjs     # Add npm resolution path
  - server/lib/plugins/loader.mjs        # Register npm source type
  - server/lib/plugins/index.mjs         # Priority ordering across sources

tests:
  - npm plugin discovered from node_modules
  - npm plugin overridden by user filesystem plugin of same name
  - npm plugin dependencies resolved correctly
  - Invalid npm plugin (wrong shape) logged and skipped
  - Version conflict detected and warned
