  step_2:
    title: "PrimerAssembler — Behaviors Injection"
    status: PLANNED
    files:
      - src/core/primer-assembler.mjs
    tests:
      - spec/core/primer-assembler-spec.mjs
    details: >
      2A. Fix existing tests: remove 6 DM-specific tests, keep 8
      non-DM behaviors tests, add ~2 tests for always-present
      management instructions.
      2B. Implement in PrimerAssembler.assemble(): append
      --- BEHAVIORS --- delimited section when agent has behaviors,
      append reminder line, always include brief management
      instruction mentioning memory:updateAgentConfig.
      No isDM parameter. No signature change.
      2C. Run tests, verify green.
    ordering: >
      [instructions] → [behaviors section] → [management note] → [reminder]

  step_3:
    title: "Post-Truncation Behaviors Re-injection"
    status: PLANNED
    files:
      - src/core/interaction/index.mjs
      - src/core/interaction/message-history.mjs  # or new utility
    tests:
      - spec/core/interaction/behaviors-reinjection-spec.mjs
    details: >
      3A. Write tests: truncation + behaviors → re-injected;
      truncation + no behaviors → nothing; no truncation → nothing;
      primer already injected → no double-injection.
      3B. Implement reinjectBehaviors() function, called in
      InteractionLoop._prepareMessages() after truncate calls.
      Gated on: truncation occurred, agent has behaviors, primer
      NOT being injected this turn.
      3C. Injection mechanism: same as injectPrimer — concatenate
      behaviors text onto first user message content. Private,
      ephemeral, not a frame.
      3D. Run tests, verify green.

  step_4:
    title: "Integration Test + Full Suite"
    status: PLANNED
    files: []
    tests:
      - spec/core/integration/behaviors-integration-spec.mjs
    details: >
      4A. Integration tests: full round-trip (create agent → set
      behaviors → assemble primer → verify); truncation round-trip
      (set behaviors → long history → truncate → verify re-injected).
      4B. Full test suite run — all existing + new tests pass.
      4C. Update this YAML to reflect completed state.

