# Behaviors System
# Deferred from: Phase C (Event Routing Layer)
# Priority: Medium
# Complexity: Medium
# Status: COMPLETE (as of 2026-03-12)

summary: >
  A system where users customize agent behavior through natural language
  conversations in any session. The agent recognizes when users want to
  change its behavior and stores those instructions as plain-text
  "behaviors" on the agent config. Behaviors are injected into the
  agent's primer for all future interactions, and re-injected after
  context truncation to ensure they survive long conversations.

current_state: >
  COMPLETE. All 4 steps implemented and tested. 2315 total tests,
  0 failures. Agent model convenience methods, PrimerAssembler
  behaviors injection, post-truncation re-injection, and full
  integration tests all passing.

design_decisions:
  - Behaviors are plain text on agent config (config.behaviors key)
  - NOT DM-only — agent can update behaviors in any session when it
    recognizes user intent to change behavior
  - No scoping (per-user/per-org) for now — start simple, may revisit
  - Conditional triggers are natural language, not structured data
    (e.g. "If you are about to commit... do X")
  - Agent stores behaviors via memory:updateAgentConfig tool
  - Management instructions live in the primer (always present)
  - Help system provides detailed docs for memory:updateAgentConfig
  - Behaviors re-injection after truncation is private text
    concatenation, not a frame or stored message
  - No session-type awareness needed — no isDM flag

requirements:
  - Users converse with agents in any session to define behaviors
  - Agent updates behaviors via memory:updateAgentConfig
  - Behaviors are injected into the agent's primer context
  - Behaviors survive context truncation (re-injected after truncate)
  - Users can review, edit, or remove behaviors conversationally
  - Agent confirms behavior changes to user
  - Management instructions always present in primer (even with no behaviors)

implementation_plan:
