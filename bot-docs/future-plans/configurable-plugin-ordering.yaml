# Configurable Plugin Ordering — API & UI
# Deferred from: Phase C (Event Routing Layer)
# Priority: Low
# Complexity: Low

summary: >
  Provide an API endpoint and org-owner-facing UI for reordering external
  plugins. The routing engine already evaluates plugins in registration
  order (internal first, then external). This feature exposes that
  ordering to org owners so they can adjust external plugin priority
  without code changes.

current_state: >
  Phase C is complete. The FrameRouter evaluates matched plugins in
  registration order: internal plugins first (command dispatch, scheduling,
  permissions, hooks), then external plugins in filesystem discovery
  order. The next()/done() middleware chain and "handled" short-circuit
  are fully implemented. There is no user-facing way to change the
  order of external plugins.

requirements:
  - API endpoint (e.g. PUT /orgs/:orgId/plugin-order) to set external
    plugin ordering for an organization
  - Settings UI tab for org owners to drag-and-drop reorder external
    plugins
  - Internal plugins are NOT reorderable (always run first, fixed order)
  - Only external plugins appear in the reorder UI
  - Default order is filesystem discovery order (current behavior)
  - Persisted on the Organization model (JSON array of plugin IDs)
  - FrameRouter reads the stored order at startup and on config change

design_notes: >
  This is purely an API + UI feature. The router already supports
  ordered evaluation — the only change needed is reading the plugin
  order from the Organization model instead of using implicit discovery
  order. The UI is a simple sortable list in the org settings page.

  Not needed until third-party or multiple external plugins exist.
  Internal plugin ordering is hardcoded and well-tested.

dependencies:
  - Phase C (Frame Event Router) — COMPLETE
  - Multiple external plugins installed (practical prerequisite)

files:
  - src/server/controllers/org-controller.mjs    # New endpoint
  - src/core/models/organization.mjs             # pluginOrder field
  - src/core/routing/frame-router.mjs            # Read stored order
  - src/client/components/kikx-settings-page/    # Reorder UI tab

tests:
  - API sets and retrieves plugin order for org
  - FrameRouter evaluates external plugins in stored order
  - Internal plugins always run before external regardless of config
  - Missing/invalid order falls back to discovery order
  - Non-owner cannot modify plugin order (403)
  - UI renders sortable list of external plugins
