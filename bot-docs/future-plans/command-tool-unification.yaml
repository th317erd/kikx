# Command-Tool Unification
# Origin: conversation.md Round 5 (2026-03-09)
# Priority: Medium
# Complexity: Medium

summary: >
  Unify commands (/slash syntax) and tools (agent tool_use) under a
  single "capability" interface. Commands become an argument-parser
  wrapper around tools. Every tool is invocable as a command, every
  command is invocable as a tool.

current_state: >
  Commands and tools are registered via separate APIs (registerCommand
  vs registerTool) with different handler shapes. Commands get raw
  string args, tools get structured JSON. Commands skip permission
  checks (user authority), tools go through PermissionService.
  Functionally identical operations require dual registration.

  Current registrations:
    Commands: /invite, /help, /reload
    Tools: shell:execute, websearch:fetch, help:search, system:command

proposed_model: >
  Define a "capability" with:
    - Name
    - JSON schema (structured args)
    - Handler function
    - Permission requirements (checked for agents, skipped for users)

  Command layer: parse "/name text" into structured args, call capability
  Tool layer: tool_use JSON maps directly to structured args, call capability
  Permissions: only checked when caller is an agent

requirements:
  - Every existing command gets a JSON schema
  - registerCapability() replaces registerCommand() + registerTool()
  - CommandHandler refactored to parse text → structured args → call capability
  - Tool registration builds tool_use JSON schema from capability schema
  - Help system surfaces capabilities uniformly (commands + tools merged)
  - Backward compat: registerCommand() and registerTool() still work
    but delegate to registerCapability() internally

dependencies:
  - Cross-session plugin built using registerTool() (in progress)
  - /invite command calling shared addParticipant() (in progress)

files:
  - src/core/plugin-loader/registry.mjs     # registerCapability()
  - src/core/plugin-loader/index.mjs        # Expose registerCapability in setup()
  - src/core/interaction/command-handler.mjs # Text → structured args → capability
  - src/core/routing/base-plugin-class.mjs  # Capability-aware onChange
  - src/core/internal-plugins/*/index.mjs   # Migrate all plugins

tests:
  - Command invocation calls capability handler with structured args
  - Tool invocation calls capability handler with structured args
  - Same capability reachable via /name and via tool_use
  - Permissions checked for agent callers, skipped for user callers
  - JSON schema validated for both command and tool invocations
  - Help system lists capabilities uniformly
  - registerCommand() backward compat delegates to registerCapability()
  - registerTool() backward compat delegates to registerCapability()
