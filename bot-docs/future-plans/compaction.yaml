  - frame-search (agents need frame:search to navigate post-compaction history)
  - tool-log (optional but recommended — tool outputs should be stored before compaction)

build_order_note: >
  Build last, after plugin-model-registry, tool-log, and frame-search are complete.
  Step 1 (plugin interface) can be done alongside plugin-model-registry plan.
  Steps 2-6 require the dependencies above.
