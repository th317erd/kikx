# Meta-Permissions — Who Can Modify Permission Rules
# Deferred from: Phase 2 (Permissions System)
# Priority: Medium
# Complexity: Medium

summary: >
  Permission rules that control who can create, modify, and delete other
  permission rules. Prevents agents from escalating their own privileges
  and ensures only authorized users can change the security policy.

current_state: >
  Any authenticated user can create/delete permission rules via the
  /api/permissions endpoints. There is no rule-about-rules enforcement.
  The ownership check (ownerId) limits visibility but doesn't prevent
  a user from creating overly permissive rules for agents they don't own.

requirements:
  - Only session owners can create rules affecting their sessions
  - Agents cannot create or modify permission rules (ever)
  - Plugin-created rules require explicit user opt-in
  - Admin role can create system-wide rules (subject_type '*')
  - Audit log entry for every rule creation/modification/deletion

design_notes: >
  Model after AWS IAM's approach: you need iam:CreatePolicy permission
  to create policies. In Hero's case, add a new resource_type 'permission'
  to the existing engine, so permission CRUD is itself gated by the
  permission engine. Bootstrap with a system-wide rule that allows
  users to manage their own rules.

files:
  - server/lib/permissions/index.mjs    # Add meta-permission checks
  - server/routes/permissions.mjs       # Gate CRUD endpoints
  - server/lib/audit.mjs                # New event: PERMISSION_RULE_CREATED/DELETED

tests:
  - User can create rules for their own agents
  - User cannot create rules for another user's agents
  - Agent API key cannot create/modify rules
  - Admin can create system-wide rules
  - Audit trail for all rule changes
