# Cross-Session Replay Prevention (Nonce)
# Deferred from: Phase 7 (Server-Authoritative Hardening)
# Priority: Medium-High
# Complexity: Medium

summary: >
  Add nonce-based replay prevention so approval responses from one session
  cannot be replayed in a different session context.

current_state: >
  Approval responses include a SHA-256 request hash that binds the approval
  to a specific ability + params combination. However, the hash doesn't
  include session ID or timestamp, so a captured approval could theoretically
  be replayed in a different session if the same ability + params are used.

requirements:
  - Include sessionId and timestamp in request hash computation
  - Add a nonce field to pending approvals (random, single-use)
  - Client must echo nonce in approval response
  - Nonce expires with the pending approval (5-minute timeout already exists)
  - Reject approval responses with missing or mismatched nonce
  - Backward compatible: old clients without nonce still work (log warning)

design_notes: >
  The SHA-256 hash in approval.mjs already covers ability name + params.
  Extending it to include sessionId + nonce is straightforward. The nonce
  should be sent to the client as part of the hml-prompt payload and
  echoed back in the WebSocket approval_response message.

files:
  - server/lib/abilities/approval.mjs    # Add nonce generation + validation
  - server/lib/websocket.mjs             # Pass nonce in approval response
  - public/js/components/hml-prompt/     # Echo nonce in response

tests:
  - Approval with correct nonce accepted
  - Approval with wrong nonce rejected
  - Approval with missing nonce accepted (backward compat) with warning
  - Same nonce cannot be reused after consumption
  - Nonce expires with pending approval timeout
