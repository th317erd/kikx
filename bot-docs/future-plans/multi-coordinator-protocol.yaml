# Multiple Coordinator Discussion Protocol
# Status: IMPLEMENTED (V2)
# Implemented: 2026-03-10
# Priority: Low
# Complexity: Very High

summary: >
  When 2+ coordinator-role participants exist in a session, user messages
  trigger a round-robin discussion protocol. Coordinators take turns
  producing discussion frames, then one claims the final response.

implemented:
  participant_roles:
    description: >
      Participant model extended with role field (coordinator/member).
      SessionManager supports addParticipant with role, updateParticipant
      applying role changes, and getCoordinators() query.
    files:
      - src/core/models/participant-model.mjs    # role field, version 2
      - src/core/session/index.mjs               # addParticipant, updateParticipant, getCoordinators

  discussion_orchestrator:
    description: >
      State machine (IDLE -> DISCUSSING -> CLAIMED -> RESPONDING -> IDLE)
      managing round-robin discussion turns. Supports @mention bypass,
      auto-claim on max rounds exceeded, deadlock prevention on errors.
    files:
      - src/core/scheduling/discussion-orchestrator.mjs  # NEW — state machine

  scheduling_integration:
    description: >
      SchedulingPlugin detects 2+ coordinators and delegates to
      DiscussionOrchestrator instead of standard SessionScheduler path.
    files:
      - src/core/internal-plugins/scheduling/index.mjs

  message_history:
    description: >
      Discussion frames rendered in agent message history with XML
      wrapping (<discussion round="N" agent="agentID">). Own discussion
      messages as assistant role, others as user role with attribution.
    files:
      - src/core/interaction/message-history.mjs

  client_display:
    description: >
      Discussion frames rendered with "Discussion (round N)" label,
      visually distinct from regular messages. Claim intent highlighted
      via data-claim-intent attribute.
    files:
      - src/client/components/kikx-session-page/kikx-session-page.mjs

events:
  - 'discussion:start'   # { sessionID, coordinators, maxRounds }
  - 'discussion:round'   # { sessionID, round, agentID }
  - 'discussion:claim'   # { sessionID, agentID, round }
  - 'discussion:end'     # { sessionID, claimedByAgentID }
  - 'discussion:bypass'  # { sessionID, targetAgentID, reason }

tests:
  - spec/core/models/participant-role-spec.mjs              # 13 tests
  - spec/core/scheduling/discussion-orchestrator-spec.mjs   # 46 tests
  - spec/core/scheduling/discussion-integration-spec.mjs    # 12 tests
