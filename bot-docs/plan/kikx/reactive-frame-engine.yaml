# =============================================================================
# Reactive Frame Engine — Git-Inspired FrameManager Evolution
# =============================================================================
# Evolves the existing FrameManager into a git-inspired reactive frame engine
# with commit log, refs, diff, windowed loading, event routing, and signing.
#
# This is NOT a rewrite. It is an incremental evolution that preserves the
# existing API surface and all existing tests.
#
# Status: Phase C (Event Routing Layer) — PLANNING
# Created: 2026-03-05
# Updated: 2026-03-07
# =============================================================================

meta:
  title: "Reactive Frame Engine"
  parent_plan: "frame-manager.yaml"
  parent_server_plan: "server-plan.yaml (Phase 3, Steps 22-23)"
  version: "0.2.0"

# =============================================================================
# 1. MOTIVATION
# =============================================================================

motivation:
  problem: |
    The current interaction loop is a synchronous coroutine — one agent, one
    generator, one queue. This doesn't support:
    - Multiple agents processing frames independently
    - Async tool execution (fire and forget, result arrives later)
    - Sub-agent delegation (parent continues while child works)
    - User interrupts during long operations
    - Efficient streaming (loads entire conversation into memory)
    - Event-driven plugin architecture (frame mutations as events)

  solution: |
    Evolve the FrameManager to use git's conceptual model:
    - Immutable commit log (every change is a commit)
    - Named refs (per-consumer cursors into the commit log)
    - Diff between refs (what's new for this consumer?)
    - Windowed loading (only hold a slice in memory)
    - Pluggable commit validator (per-file permissions)
    - Frame event router (frame mutations trigger plugin handlers)
    - Silent commits (persist without triggering routing)
    - System envelope signing (cryptographic approval verification)

    The FrameManager becomes the backbone of a multi-actor, event-driven
    system where any source can push frames at any time, and each consumer
    processes at its own pace.

  principles:
    - "The database is the source of truth. The FrameManager is a materialized view."
    - "Identity is kernel-set, not actor-set."
    - "Every change is a commit. Every commit is immutable."
    - "Consumers track their own position via refs."
    - "Frames are virtual files. Deep merge is tree merge."
    - "Multi-actor by default. Single-actor is just the degenerate case."
    - "Frame mutations are the universal event primitive."
    - "Plugins react to frame state changes, not procedure calls."

# =============================================================================
# 2. IMPLEMENTATION DECISION
# =============================================================================

implementation:
  language: "Pure JavaScript"
  rationale:
    - "We own the code (GPL 3 clean). No license compatibility issues."
    - "Zero added bundle weight (no WASM binary, no external dependency)."
    - "Same test runner, same assertions, same CI as existing tests."
    - "Hybrid storage: SQL for frames/commits, git-model for change tracking."
    - "Evolution, not revolution: existing FrameManager + tests as baseline."
    - "JS is fast enough for a chat app. Network latency dominates, not frame ops."
    - "Ed25519 signing via node:crypto — no external dependency."
  rejected_alternatives:
    rust_wasm:
      reason: |
        Overkill for 500-800 lines of logic. Adds Rust toolchain dependency,
        cross-language testing friction, and WASM compilation pipeline.
        Revisit if performance becomes critical at scale.
    isomorphic_git:
      reason: |
        Filesystem abstraction mismatch (BYOFS assumes file I/O patterns).
        72KB added bundle. External dependency with someone else's decisions.
    libgit2_wasm:
      reason: |
        2.7MB bundle size. Semi-abandoned WASM wrapper. GPL 2 licensing
        (no upgrade path to GPL 3). Not designed for structured data.
  seqda:
    decision: "Drop seqda dependency"
    rationale: |
      seqda provided: Object.freeze immutability, batched microtask events,
      per-argument method caching. With the git-model evolution:
      - Immutability is by convention (commits are append-only, frames treated as immutable)
      - Events fire per-operation via plain EventEmitter (no microtask batching needed)
      - Caching is handled by the storage adapter, not the data structure
      seqda's value was in its reactive state model. The git-model replaces that
      with commits + refs + diff — a more powerful reactive primitive.

# =============================================================================
# 3. DATA MODEL
# =============================================================================

data_model:

  # --- Frame (unchanged from frame-manager.yaml) ---
  frame:
    description: |
      Value object representing a single unit of conversation state.
      Unchanged from existing Frame class. All existing properties preserved.
      See frame-manager.yaml for full specification.
    additions:
      - name: "commitOrder"
        type: "number"
        description: |
          The commit order at which this frame was created or last modified.
          Set by the FrameManager when the frame is merged. Links the frame
          to its creating/modifying commit. Not writable by external actors.

  # --- Commit ---
  commit:
    description: |
      Immutable record of a state transition. Every merge() call that modifies
      state creates exactly one commit. Analogous to a git commit.
    shape:
      order:
        type: "number"
        description: |
          Monotonic counter. Serves as the commit identifier. Database-assigned
          on the server, in-memory counter in the browser. The authoritative
          ordering key — no vector clocks needed because the server is the
          single coordinator.
      changes:
        type: "Array<{ frameId, operation, fields? }>"
        description: |
          List of frames affected by this commit.
          operation: 'create' | 'update' | 'delete'
          fields: optional array of changed field names (for updates)
      authorType:
        type: "string"
        description: "Who created this commit: 'user', 'agent', 'tool', 'system'"
      authorId:
        type: "string | null"
        description: "Specific actor ID. Null for system commits."
      timestamp:
        type: "number (epoch ms)"
        description: "Wall-clock time of commit creation."
      parentOrder:
        type: "number | null"
        description: |
          The order of the previous commit. Null for the first commit.
          Forms the commit chain (linked list). In practice, parentOrder
          is always order - 1 since we use monotonic ordering, but we store
          it explicitly for integrity verification.
      silent:
        type: "boolean"
        default: false
        description: |
          If true, this commit does NOT trigger event routing. Used for
          progress updates, agent ref advances, error frames, bookkeeping.
          Silent commits are real commits — they appear in the commit log
          and are persisted — they just don't fire plugin handlers.
    notes:
      - "Commits are APPEND-ONLY. Never modified after creation."
      - "An empty merge (no state change) creates no commit."
      - "Multiple frames in one merge = one atomic commit."
      - "Phantom updates that merge into group frames are commits too."
      - "Bulk loading (events:false) can create one commit per frame or batch."

  # --- Ref ---
  ref:
    description: |
      Named pointer to a commit order. Analogous to a git ref (branch, tag).
      Used to track per-consumer state: where has this consumer read up to?
    shape:
      name:
        type: "string"
        description: |
          Hierarchical name. Convention:
          - 'heads/main' — latest commit (auto-advanced on every commit)
          - 'processed/<actorId>' — where an actor has processed up to
          - 'seen/<clientId>' — where a UI client has rendered up to
      commitOrder:
        type: "number"
        description: "The commit order this ref points to."
    notes:
      - "Refs are mutable pointers. Only the commitOrder changes."
      - "'heads/main' is automatically advanced on every commit."
      - "All other refs are manually advanced by their owner."
      - "Ref names are hierarchical strings — no enforcement on structure."

# =============================================================================
# 4. OPERATIONS
# =============================================================================

operations:

  # --- merge() (evolved) ---
  merge:
    signature: "merge(frames, options?) -> Array<Frame>"
    description: |
      PRIMARY ENTRY POINT — unchanged API signature. Still accepts an array
      of frames. Still returns array of affected/created frames. Still
      performs deep-merge, phantom handling, multi-target, etc.

      NEW BEHAVIOR: Also creates a commit record for the operation.
      The commit records which frames were created/updated/deleted.
    options:
      events:
        type: boolean
        default: true
        description: "Same as before — suppress per-frame events for bulk loading."
      authorType:
        type: string
        description: "Author of this commit. Default: 'system'."
      authorId:
        type: "string | null"
        description: "Actor ID for this commit. Default: null."
      silent:
        type: boolean
        default: false
        description: |
          If true, commit is created but event routing is NOT triggered.
          Used for progress updates, bookkeeping, error frames.
    backward_compat: |
      Callers that don't pass authorType/authorId get system commits.
      This preserves backward compatibility with all existing tests.

  # --- Commit operations ---
  getCommit:
    signature: "getCommit(order) -> Commit | undefined"
    description: "Retrieve a specific commit by its order."

  getCommits:
    signature: "getCommits(fromOrder, toOrder) -> Array<Commit>"
    description: "Retrieve commits in a range (exclusive fromOrder, inclusive toOrder)."

  getLatestCommit:
    signature: "getLatestCommit() -> Commit | undefined"
    description: "Return the HEAD commit (highest order)."

  # --- Ref operations ---
  createRef:
    signature: "createRef(name, commitOrder) -> void"
    description: "Create a named ref pointing to a commit order."

  getRef:
    signature: "getRef(name) -> number | undefined"
    description: "Get the commit order a ref points to."

  updateRef:
    signature: "updateRef(name, commitOrder) -> void"
    description: |
      Move a ref to a new commit order. The commit must exist.
      Emits 'ref:updated' event.

  deleteRef:
    signature: "deleteRef(name) -> void"
    description: "Remove a ref."

  listRefs:
    signature: "listRefs(prefix?) -> Map<string, number>"
    description: "List all refs, optionally filtered by prefix (e.g. 'processed/')."

  # --- Diff operations ---
  diff:
    signature: "diff(fromOrder, toOrder) -> Array<{ frameId, operation, frame }>"
    description: |
      Return all frame changes between two commit orders. Each entry
      includes the frameId, the operation (create/update/delete), and
      the frame's current state (HEAD after all changes applied).
    notes:
      - "fromOrder is exclusive, toOrder is inclusive."
      - "diff(0, HEAD) returns all frames (full history)."
      - "diff(same, same) returns empty array."
      - "Can accept ref names instead of numbers: diff('processed/agent-1', 'heads/main')."

  diffFrames:
    signature: "diffFrames(fromOrder, toOrder) -> Array<Frame>"
    description: |
      Convenience method. Returns just the frames (current HEAD state)
      that changed between two commits. No operation metadata.
      Most common use case: 'what frames are new for this consumer?'

  # --- Window operations ---
  loadWindow:
    signature: "loadWindow(frames, fromOrder, toOrder) -> void"
    description: |
      Load a slice of frames into memory. Frames outside this range
      are not held. Used for initial page load and backfill.
      Internally calls merge() with events:false.

  evict:
    signature: "evict(belowOrder) -> number"
    description: |
      Remove frames with order below the threshold from memory.
      Returns count of evicted frames. Used for memory pressure relief.
      Does NOT delete from database — just releases from in-memory maps.

  getWindowBounds:
    signature: "getWindowBounds() -> { from: number, to: number }"
    description: "Return the current loaded window range."

  # --- Commit Validator ---
  commit_validator:
    description: |
      Pluggable validation function injected via constructor. Called before
      every merge() commits changes. Can reject the entire commit.
    constructor_option:
      name: "commitValidator"
      type: "function | null"
      signature: "(commit, frames, actorContext) -> { allowed: boolean, reason?: string }"
      default: "null (no validation — everything allowed)"
    behavior:
      - "Called AFTER merge logic computes changes, BEFORE commit is recorded."
      - "If rejected: changes are rolled back, commit is not created."
      - "Rejection emits 'commit:rejected' event with reason."
      - "Consistent with FrameManager's silent-rejection posture."
    actor_context:
      description: |
        Passed through from merge() options. Contains identity information
        set by the kernel. The validator uses this to check ACLs.
      shape:
        authorType: "string — 'user' | 'agent' | 'tool' | 'system'"
        authorId: "string | null"

# =============================================================================
# 5. PERMISSION MODEL
# =============================================================================

permissions:
  description: |
    Multi-tier permission architecture combining structural ACLs (commit
    validator) with cryptographic approval signing (envelope signatures).

  tier_1_authentication:
    description: "Server/Kernel sets authorType and authorId. External."
    location: "src/server/ (middleware, controllers)"

  tier_2_structural_acls:
    description: "Commit validator enforces structural rules."
    location: "Pluggable function injected into FrameManager"
    rules:
      type_restrictions:
        description: "Which frame types each actor type can create."
        rules:
          system: "Can create ANY frame type"
          user: "Can create: user-message, hml-prompt-value, permission-grant"
          agent: "Can create: message, tool-call, reflection, sub-agent-call"
          tool: "Can create: tool-result, tool-error"

      ownership_enforcement:
        description: "Who can modify existing frames."
        rules:
          system: "Can modify ANY frame"
          others: "Can only modify frames where authorId matches"

      property_protection:
        description: "Which properties are writable."
        rules:
          system: "Can set ALL properties including processed, processedAt"
          others: "Can set ONLY mergeable properties (content, hidden, deleted, updatedAt)"
          immutable: "type, authorType, authorId — never changeable after creation by anyone"

      ref_ownership:
        description: "Who can move which refs."
        rules:
          system: "Can update ANY ref"
          actor: "Can only update refs under their own namespace (processed/<ownId>)"

  tier_3_approval_signing:
    description: |
      Cryptographic approval verification via envelope signing. The system
      always signs on behalf of an authenticated user. Security comes from
      signature verification, not from protected properties on frames.
    location: "src/core/auth/signing.mjs"
    model:
      per_request:
        description: |
          User clicks "Approve" for a specific tool call.
          Deterministic blob: authUserID:frameID:timestamp
          User signs blob with private key.
          System signs user's signature with system key.
          Both signatures stored on approval frame.
      standing_approval:
        description: |
          User creates a standing rule (e.g. "allow all shell commands in this session").
          Deterministic blob: authUserID:pattern:type:scope:timestamp
          User signs blob with private key (one-time delegation).
          System references standing approval for future auto-approvals.
          System signs on behalf of user for matching tool calls.
      verification:
        description: |
          1. Reconstruct deterministic blob from stored fields
          2. Verify user signature with user's public key
          3. Verify system signature (of user's signature) with system public key
          Both must pass. Tampered fields → reconstructed blob differs → verification fails.
      dangerous_mode:
        description: |
          Standing approval with pattern '*', per-session scope by default.
          Global scope available via user preferences (with warning).
          Same signing. Same verification. Same audit trail.
    future:
      - "Key rotation with versioned key pairs (see future-plans/key-rotation.yaml)"
      - "Per-user key pairs for federation (see future-plans/signatures-federation.yaml)"

  tier_4_policy:
    description: "User-configurable tool policies. External."
    location: "src/core/permissions/permission-engine.mjs"
    note: "Unchanged. Orthogonal to structural ACLs and signing."

# =============================================================================
# 6. EVENT ROUTING
# =============================================================================

event_routing:
  description: |
    The core innovation of Phase C. Frame mutations become events.
    When FrameManager.merge() creates or modifies frames (non-silent),
    the Frame Router determines which plugins care about that frame
    and invokes their process() handler via a middleware chain.

  frame_router:
    description: |
      The routing engine. Receives non-silent commits from FrameManager,
      computes diffs, matches registered selectors, and dispatches to
      plugin handlers via next()/done() middleware chain.
    behavior:
      - "Routing happens per-commit, not per-frame"
      - "Synchronous matching (selector evaluation), async handling (plugin process)"
      - "Handler isolation: one handler's failure does not prevent others from firing"
      - "Re-entrant safety: handlers that create frames add commits to a queue processed iteratively"
      - "Router computes context.changes (property diffs) before dispatching"

  plugin_lifecycle:
    description: |
      Plugins register selectors at setup() time. The router instantiates
      a fresh plugin class per routing cycle. No long-lived instances.
    registration: |
      registerSelector(selector, PluginClass) — class, not instance.
      Selectors compiled once at registration time.
      Alongside existing registerTool and registerCommand (not a replacement).
    instantiation: |
      Per routing cycle: new PluginClass(context).
      Context stored on this.context (available in process() and onChange()).
      Instance GC'd after routing cycle completes.
    context:
      frames: "Full frame stack (for lookups)"
      previousFrame: "Frame before this commit (null for creation)"
      newFrame: "Frame after this commit (null for deletion)"
      changes: "Array<{ propName, previousValue, newValue }> — pre-computed diff"
      commit: "The commit that triggered this routing cycle"
      engine: "Frame engine / manager — query frames, create commits"
      session: "Session context (participants, settings)"
      logger: "Scoped logger for this plugin (also available as this.logger)"

  plugin_interface:
    process:
      signature: "async process(next, done)"
      description: |
        Primary entry point. Called when the plugin's selector matches a frame.
        Plugin MUST call either next(context) or done(context).
        next(context): continue chain, optionally with modified context.
        done(context): stop chain intentionally.
    onChange:
      signature: "onChange(propName, previousValue, newValue)"
      description: |
        Convenience helper called by processChanges().
        Iterates context.changes and calls onChange() per changed property.
        Optional — plugins can work directly with context.newFrame instead.
    checkPermission:
      signature: "async checkPermission(toolName, params)"
      description: |
        BasePluginClass method. Checks for valid signed approval.
        If approved: returns immediately.
        If denied: creates permission-request frame, returns denied.
        Caller (the plugin) should call done() on denial.
        This is a SERVICE on BasePluginClass, not a separate plugin.

  middleware_chain:
    description: |
      Plugins execute as an ordered middleware chain via next()/done().
    error_handling:
      missing_next_done: |
        Plugin returns without calling next() or done().
        Logged as error. Router calls next(context) automatically.
        Chain continues. Future: evict plugin after N consecutive failures.
      plugin_throws: |
        Plugin throws an exception during process().
        Logged as error. Router calls next(context) automatically.
        Chain continues. One plugin crash never breaks the chain.
      plugin_calls_done: "Chain stops intentionally. No error."
      plugin_calls_next: "Chain continues with (potentially modified) context."

  selector_syntax:
    description: |
      CSS-selector-inspired syntax for matching frames.
      Compiled once at registration time into matcher functions.
    examples:
      - "type:user-message — match frame.type === 'user-message'"
      - "type:* — catch-all matcher"
      - "author:agent — match frame.authorType === 'agent'"
      - "type:tool-call[toolName=shell:execute] — type + content property match"
    supports:
      - "Type selectors (type:foo)"
      - "Author selectors (author:agent)"
      - "Property selectors ([propName=value])"
      - "Wildcard (type:*)"
      - "Function predicates (passed through as-is)"

  silent_commits:
    description: |
      merge([frames], { silent: true }) persists without triggering routing.
    use_cases:
      - "Progress updates during tool execution"
      - "Agent ref advances"
      - "Error frames (prevents error cascades)"
      - "Internal bookkeeping"
    behavior:
      - "Silent commits are real commits — they appear in the commit log"
      - "Silent commits do NOT trigger the frame router"
      - "Default merge (no options) triggers routing"

  tool_call_lifecycle:
    description: |
      Tool-call frames have a state lifecycle, each transition visible
      in the commit log:
    states:
      - pending: "Tool call created by agent"
      - approved: "Signed approval from user/system (via checkPermission)"
      - denied: "User denied the tool call"
      - executing: "Tool is running"
      - complete: "Tool result available"
    flow:
      standard: |
        1. Agent yields tool-call → frame created (pending)
        2. Tool plugin calls checkPermission() → needs approval
        3. checkPermission creates permission-request frame, returns denied
        4. Tool plugin calls done()
        5. User approves → signed approval frame created
        6. Approval routes to permission system → original tool-call frame gets signed commit
        7. Tool-call frame update re-routes to tool plugin
        8. Tool plugin calls checkPermission() again → approved (valid signature)
        9. Tool executes → frame updated (executing → complete)
      pre_approved: |
        1. Agent yields tool-call → frame created (pending)
        2. Tool plugin calls checkPermission() → standing approval exists → auto-approved
        3. Tool executes immediately

# =============================================================================
# 7. EVENTS
# =============================================================================

events:
  existing_preserved:
    - "frame:added"
    - "frame:added:{frameId}"
    - "frame:updated"
    - "frame:updated:{frameId}"
    - "frame:processed"
    - "frame:processed:{frameId}"
    - "frames:bulk-loaded"
    - "frame:phantom"

  new_events:
    - name: "commit"
      payload: "{ commit }"
      when: "A new commit is created (every successful merge)."
    - name: "ref:updated"
      payload: "{ name, previousOrder, newOrder }"
      when: "A ref is moved to a new commit order."
    - name: "ref:created"
      payload: "{ name, commitOrder }"
      when: "A new ref is created."
    - name: "ref:deleted"
      payload: "{ name }"
      when: "A ref is removed."
    - name: "commit:rejected"
      payload: "{ reason, authorType, authorId, frames }"
      when: "Commit validator rejects a merge."

# =============================================================================
# 8. INTERNAL STRUCTURE
# =============================================================================

internals:
  description: |
    Plain Maps and EventEmitter replace seqda. The FrameManager owns its
    own state directly. No external state management library.
  data_structures:
    _frames:
      type: "Map<string, Frame>"
      description: "frameId → Frame (HEAD version)"
    _pointers:
      type: "Map<string, FramePointer>"
      description: "frameId → FramePointer (HEAD pointer)"
    _children:
      type: "Map<string, Set<string>>"
      description: "parentId → Set of child frameIds"
    _commits:
      type: "Array<Commit>"
      description: "Ordered commit log (append-only)"
    _refs:
      type: "Map<string, number>"
      description: "refName → commitOrder"
    _orderCounter:
      type: "number"
      description: "Monotonic counter for commit/frame ordering"
  event_emitter:
    source: "node:events (Node.js) or compatible polyfill (browser)"
    note: |
      No microtask batching (unlike seqda). Events fire synchronously
      during merge(). This is simpler and more predictable. If batching
      is needed later, it can be added as an opt-in wrapper.

# =============================================================================
# 9. STORAGE ADAPTER (Phase D)
# =============================================================================

storage_adapter:
  description: |
    Pluggable storage backend for persisting frames and commits.
    Phase A/B use in-memory only. Phase D adds persistent backends.
  interface:
    loadFrames: "(fromOrder, toOrder) -> Array<Frame>"
    loadCommits: "(fromOrder, toOrder) -> Array<Commit>"
    saveCommit: "(commit, frames) -> void"
    loadRefs: "() -> Map<string, number>"
    saveRef: "(name, commitOrder) -> void"
  implementations:
    memory:
      description: "In-memory Maps. Default. Used in browser and tests."
    sqlite:
      description: "SQLite via Mythix ORM. Server-side. Phase D."
    indexeddb:
      description: "Browser persistence. Future consideration."
  query_patterns:
    note: |
      Frames are stored as rows with JSON content — NOT as many small
      files (which would create pathological query patterns). The hybrid
      model: SQL for frames, git-model for commits/refs/diff.
    common_queries:
      - "SELECT * FROM frames WHERE session_id = ? AND order BETWEEN ? AND ? ORDER BY order"
      - "SELECT * FROM commits WHERE session_id = ? AND order > ? ORDER BY order"
      - "SELECT name, commit_order FROM refs WHERE session_id = ?"

# =============================================================================
# 10. PHASED BUILD
# =============================================================================

phases:

  A:
    name: "Foundation"
    status: COMPLETE
    description: |
      Evolve FrameManager internals. Drop seqda. Add commit log, refs, diff.
      All 257 existing tests adapted and passing.
    deliverables:
      - "Drop seqda dependency, replace with plain Maps + EventEmitter"
      - "Commit log: every merge() creates a Commit record"
      - "Refs: create, get, update, delete, list"
      - "Diff: between any two commit orders or ref names"
      - "Window: loadWindow(), evict(), getWindowBounds()"
      - "Commit validator: pluggable, optional"
    test_count: "~320 tests"

  B:
    name: "Multi-Actor"
    status: COMPLETE
    description: |
      Evolve InteractionLoop to use ref-based scheduling. Multiple agents
      per session. Commit validator with full ACLs. Message assembly v2.
    deliverables:
      - "Author fields on frames and commits"
      - "Structural ACL commit validator"
      - "Frame creation pivot (InteractionLoop creates frames)"
      - "Per-agent refs: each agent tracks its own processed position"
      - "Session scheduler: watches commits, triggers agent interactions"
      - "Message assembly v2: frame IDs, source attribution"
      - "Controller integration and stop-as-commit"
      - "Scheduler orchestrator for multi-agent coordination"
    test_count: "~1411 tests"

  C:
    name: "Event Routing Layer"
    status: PLANNING
    description: |
      Transform Kikx from a procedurally-orchestrated interaction system
      into a declarative, event-driven architecture where frame mutations
      are the universal event primitive. The InteractionLoop, permission
      system, and multi-agent scheduler become plugins reacting to frame
      mutations rather than hardwired kernel logic.
    sub_phases:

      C1:
        name: "Frame Event Router Foundation"
        description: |
          Build the core routing engine, selector compiler, silent commit
          mode, BasePluginClass with middleware chain, and wire into KikxCore.
        deliverables:
          - "SelectorCompiler: parse selector strings into matcher functions"
          - "FrameRouter: match commits to selectors, dispatch via middleware chain"
          - "BasePluginClass: context, processChanges(), onChange(), checkPermission()"
          - "next(ctx)/done(ctx) middleware chain with safety net"
          - "Silent commit flag on merge() options"
          - "registerSelector() on PluginContext and PluginRegistry"
          - "Router wired into KikxCore"
        files:
          new:
            - "src/core/routing/frame-router.mjs"
            - "src/core/routing/selector-compiler.mjs"
            - "src/core/routing/base-plugin-class.mjs"
            - "spec/core/routing/frame-router-spec.mjs"
            - "spec/core/routing/selector-compiler-spec.mjs"
            - "spec/core/routing/base-plugin-class-spec.mjs"
          modified:
            - "src/shared/frame-manager/frame-manager.mjs — add silent flag"
            - "src/core/plugin-loader/index.mjs — add registerSelector to context"
            - "src/core/plugin-loader/registry.mjs — add _selectors registry"
