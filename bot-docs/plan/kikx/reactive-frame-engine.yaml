# =============================================================================
# 12. DESIGN DECISIONS LOG
# =============================================================================

design_decisions:
  description: |
    Key decisions made during conversation.md dialog (2026-03-06 to 2026-03-07).
    Preserved here for future reference.

  decisions:
    - topic: "onChange signature"
      decision: "onChange(propName, previousValue, newValue)"
      rationale: "Plugin can dispatch per-property. Router does the diff, plugin gets granularity."

    - topic: "Routing model"
      decision: "next(ctx)/done(ctx) middleware chain"
      rationale: |
        Plugins can modify context for downstream plugins. Single system
        instead of separate middleware + broadcast. Plugin authors are
        competent engineers — missing next/done is their bug to fix.

    - topic: "Plugin lifecycle"
      decision: "Class registration, fresh instance per routing cycle"
      rationale: |
        No long-lived state, no cross-contamination, no memory leaks.
        Context on constructor since instance is short-lived.

    - topic: "Permission architecture"
      decision: "checkPermission() as a service on BasePluginClass"
      rationale: |
        Not a separate middleware plugin. Any plugin can call it. The
        permission system is baked into the system, not a plugin.

    - topic: "Permission approval flow"
      decision: "Permission system stamps the frame, frame re-routes to tool plugin"
      rationale: |
        Separation of concerns. Permission plugin is a gatekeeper that
        stamps frames, not a dispatcher that executes tools.

    - topic: "Protected properties"
      decision: "Not needed — security via signature verification"
      rationale: |
        Anyone can write any property. checkPermission() verifies
        cryptographic signatures, not boolean flags.

    - topic: "Signing model"
      decision: "System envelope signing with deterministic blobs"
      rationale: |
        System always signs on behalf of authenticated user. Per-user
        key pairs deferred to federation. System key for now.

    - topic: "Plugin storage"
      decision: "Plugin JIT-loads its own data during async process()"
      rationale: "Router/engine not aware of plugin storage. Lazy loading."

    - topic: "Dangerous mode"
      decision: "Standing approval with pattern '*', per-session default"
      rationale: "Same signing, same audit trail. Not a special system."

    - topic: "Error handling"
      decision: "Never break the chain"
      rationale: |
        Missing next/done → log + call next. Throw → log + call next.
        A broken plugin should never halt all downstream processing.
