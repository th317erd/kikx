# =============================================================================
# Permission Integration — Frame-Based, Signature-Driven Permissions
# =============================================================================
# Remove PermissionEngine. PermissionsClass owns the full lifecycle.
# Approvals and denials are cryptographically signed frames.
# The FrameRouter is the only dispatch mechanism.
#
# Prerequisite: Unified Class Registry (Phases 1-6) — COMPLETE
# Fixes: Infinite recursion bug (ShellPermissions → PermissionEngine → ShellPermissions)
# Fixes: 4 pre-existing test failures in cross-session/memory permissions
#
# Created: 2026-03-24
# =============================================================================

meta:
  title: "Permission Integration — Frame-Based Signature-Driven Permissions"
  version: "1.0.0"

# =============================================================================
# 1. THE NEW PERMISSION LIFECYCLE
# =============================================================================
#
# 1. Tool executes → _checkPermissions()
#    a. riskLevel 'none' → proceed (no check)
#    b. PermissionsClass.evaluate() checks:
#       - Standing PermissionRule records (DB query, no engine)
#       - One-time approval rules (from approved PermissionRequest frames)
#    c. Allow rule found → proceed
#    d. Deny rule found → throw PermissionDeniedError
#    e. No rule match + risk is permissive → proceed
#    f. No rule match + risk is normal/strict → throw PermissionRequiredError
#
# 2. InteractionLoop catches PermissionRequiredError
#    a. Dedup check: hash(toolName, args, agentID, sessionID)
#       - If matching unprocessed PermissionRequest exists → reuse it
#    b. Creates PermissionRequest frame (signed by system)
#    c. Creates ToolResult: "Permission required for {tool}. Request ID: {id}"
#    d. Interaction ends (generator destroyed for server resilience)
#       Permission requests can live for weeks — generators can't.
#    e. Cross-session: routes to nearest ancestor session with user
#    f. No user in ancestry → immediate denial ToolResult
#
# 3. Client renders PermissionRequest → user clicks Approve/Deny
#    a. Client sends approval/denial to server (JWT carries UMK)
#    b. Server: request.getUMK() → decryptUserPrivateKey() → sign
#    c. Server writes approval signature onto PermissionRequest frame
#    d. For "forever" decisions, creates standing PermissionRule
#
# 4. FrameRouter fires on PermissionRequest frame update
#    a. PermissionApprovalPlugin verifies approval signature (Ed25519)
#    b. On valid approval:
#       - Creates one-time allow rule (session-scoped PermissionRule)
#       - Hides the placeholder "awaiting" ToolResult
#       - Starts new interaction
#    c. On valid denial:
#       - Hides the placeholder "awaiting" ToolResult
#       - Creates denial ToolResult
#       - Starts new interaction
#    d. The approval plugin does NOT execute the tool directly.
#
# 5. New interaction replays from history
#    a. InteractionLoop detects approved-but-unexecuted tool call
#    b. Feeds the tool call back through the NORMAL execution path
#    c. _checkPermissions() → evaluate() → finds one-time allow rule → proceeds
#    d. Tool executes through its standard execute() → _execute() pipeline
#    e. Real ToolResult created, agent sees actual output and continues
#
# 6. PermissionEngine is deleted. All rule evaluation lives in
#    Permissions base class (query PermissionRule model directly).
#    PermissionService is simplified (no engine dependency).
#
# No expiry. Permission requests live until acted on or session deleted.

# =============================================================================
# 2. DESIGN DECISIONS
# =============================================================================

design:
  re_execution_through_normal_path: |
    The approval plugin NEVER calls toolInstance.execute() directly.
    Instead, it ensures the approval is discoverable as a rule, then
    starts a new interaction. The tool goes through its normal
    execute() → _checkPermissions() → evaluate() → _execute() pipeline.

    On approval:
      1. Plugin creates a one-time allow rule (PermissionRule, session-scoped)
      2. Plugin hides the placeholder "awaiting" ToolResult
      3. Plugin starts new interaction
      4. InteractionLoop detects the approved-but-unexecuted tool call
      5. Feeds it through the normal tool execution path
      6. _checkPermissions() → evaluate() → finds one-time rule → proceeds
      7. Tool executes normally → real ToolResult created

    This is provably correct: the tool's own permission checking validates
    the approval. No backdoor, no special path. The same code runs
    whether the tool is called fresh or replayed after approval.

  approval_signature_binding: |
    The approval signature cryptographically binds to:
      - frameID of the PermissionRequest (prevents replay across requests)
      - toolName (prevents tool swap)
      - toolArguments (prevents argument escalation)
      - sessionID (prevents cross-session replay)
    Payload: canonicalize({ action, frameID, toolName, arguments, sessionID })
    Signed with user's Ed25519 private key.

  signing_uses_existing_umk_flow: |
    The signing infrastructure already exists:
      request.getUMK() → keystore.decryptUserPrivateKey(envelope, umk, userID)
      → keystore.signWithPrivateKey(payload, privateKey)
    The JWT carries the UMK (wrapped by REK). Every authenticated request
    can sign. The approve endpoint just uses the same pattern as
    sendMessage and agent-controller already use.

  interaction_ends_on_permission_request: |
    Permission requests can live for weeks (user steps away, comes back
    days later). Generators are in-memory and can't survive server
    restarts. Therefore: the interaction ALWAYS ends when permission is
    needed. The generator is destroyed. On approval, a new interaction
    replays from frame history.

    This applies to BOTH same-session and cross-session flows. The only
    difference is WHERE the PermissionRequest frame is routed (same
    session vs ancestor session).

  deterministic_dedup: |
    Before creating a PermissionRequest, compute:
      hash = sha256(toolName + canonicalize(arguments) + agentID + sessionID)
    Store as content.requestHash on the PermissionRequest frame.
    If an unprocessed PermissionRequest with the same hash exists in the
    session, don't create a duplicate. Return the existing request ID:
      "Permission already requested. Request ID: {existingFrameID}"

  pending_action_removed: |
    PendingAction frames are removed from the flow. The PermissionRequest
    frame IS the pending action. The toolUseID, toolName, and arguments
    live on the PermissionRequest frame's content and state.

  no_expiry: |
    Permission requests never expire. They live until acted on (approved
    or denied) or until the session is deleted. No expiry system, no
    timeout logic, no cleanup jobs. Simple.

  agent_informed: |
    At every state transition, the agent gets a ToolResult:
    - Permission requested: "Permission required for {tool}. Request ID: {id}"
    - Permission approved: actual tool output (from normal execution path)
    - Permission denied: "Permission denied for {tool}. User denied execution."
    - Duplicate request: "Permission already requested. Request ID: {id}"

  permission_engine_removed: |
    PermissionEngine is deleted entirely. Its rule evaluation logic moves
    into the Permissions base class. The Permissions class queries
    PermissionRule records directly via the models on context.

  permissions_class_lifecycle: |
    Permissions base class gains:
      evaluate(featureName, args, options) — full rule evaluation
        1. Query PermissionRule records for org + feature
        2. Filter by scope hierarchy (frame → session → global)
        3. Walk up session ancestry for session-scoped rules
        4. Call this.matchesRule() for custom matching
        5. First match: deny → throw, allow → return false
        6. No match: check risk level → return true/false
      Also absorbs: createRule(), deleteRule(), getRules(), pruneExpired()
      This replaces PermissionEngine entirely.

