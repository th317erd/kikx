# =============================================================================
# 4. IMPLEMENTATION PHASES
# =============================================================================

phases:
  phase_1:
    name: "Permissions.evaluate() — Rule Evaluation Without Engine"
    description: |
      Move PermissionEngine's rule evaluation logic into the Permissions
      base class as evaluate(). TDD — write tests first, then implement.
      This is the foundation that everything else builds on.
    steps:
      - id: "1.1"
        task: "Write failing tests for Permissions.evaluate()"
        tdd: true
        file: "spec/core/permissions/permissions-evaluate-spec.mjs"
        description: |
          Tests need the full core started (for PermissionRule model access).

          Test cases (~15):
          - evaluate() with no rules → returns true (needs approval) for strict
          - evaluate() with no rules → returns false (auto-allow) for permissive
          - evaluate() with allow rule → returns false
          - evaluate() with deny rule → throws PermissionDeniedError
          - evaluate() with expired rule → ignores it
          - evaluate() with session-scoped rule matching current session → matches
          - evaluate() with session-scoped rule for different session → no match
          - evaluate() with global-scoped rule → matches any session
          - evaluate() priority: higher priority rule wins
          - evaluate() with riskLevel 'critical' → always needs approval (ignores allow)
          - evaluate() with custom matchesRule() returning false → rule skipped
          - evaluate() with custom matchesRule() returning true → rule applies
          - evaluate() ancestry walk-up: rule on parent session matches child
          - evaluate() ancestry walk-up disabled for strict risk level
          - evaluate() with riskLevel 'none' → returns false (auto-allow)

      - id: "1.2"
        task: "Implement Permissions.evaluate()"
        file: "src/core/permissions/permissions-base.mjs"
        description: |
          Add evaluate(featureName, args, options) method to the Permissions
          base class. Options: { organizationID, scope, scopeID, agent, user,
          sessionManager, riskLevel }.

          Implementation: port PermissionEngine.checkPermission() logic
          directly, but query PermissionRule model from context instead
          of going through an engine instance.

          Key: the Permissions class now queries the DB directly:
            let { PermissionRule } = this._context.getProperty('models');
            let rules = await PermissionRule.where.organizationID.EQ(orgID)
              .AND.featureName.EQ(featureName).all();

      - id: "1.3"
        task: "Run tests, verify all pass"
        description: "Run spec/core/permissions/permissions-evaluate-spec.mjs"

      - id: "1.4"
        task: "Commit"
        description: "feat: add Permissions.evaluate() — rule evaluation without PermissionEngine"

  phase_2:
    name: "Wire PluginInterface to Permissions.evaluate()"
    description: |
      Rewrite _checkPermissions() on PluginInterface to call
      PermissionsClass.evaluate() directly instead of PermissionEngine.
      This eliminates the infinite recursion path.
    steps:
      - id: "2.1"
        task: "Write failing tests for new _checkPermissions() flow"
        tdd: true
        file: "spec/core/plugin-loader/plugin-interface-permissions-spec.mjs"
        description: |
          Unit tests (mock context, no core start needed):
          - riskLevel 'none' → no permission check
          - No PermissionsClass → default deny-by-default (needs approval)
          - PermissionsClass.evaluate() returns false → proceeds
          - PermissionsClass.evaluate() returns true → throws PermissionRequiredError
          - PermissionsClass.evaluate() throws PermissionDeniedError → propagates
          - Timeout: evaluate() hangs → times out after 10s
          - PermissionsClass.evaluate() returns null → falls back to base evaluate()

      - id: "2.2"
        task: "Rewrite PluginInterface._checkPermissions()"
        file: "src/core/plugin-loader/plugin-interface.mjs"
        description: |
          Remove _checkPermissionEngine(). The new flow:
            1. riskLevel 'none' → return
            2. Get PermissionsClass from tool (getPermissionsClass())
            3. If PermissionsClass: call permissions.evaluate(featureName, args, options)
               - returns false → return (approved)
               - returns true → throw PermissionRequiredError
               - throws → propagate
            4. If no PermissionsClass: use new Permissions(context).evaluate()
               as the default (base class provides deny-by-default)

          Remove ALL references to permissionEngine from PluginInterface.

      - id: "2.3"
        task: "Update ShellPermissions to use this.evaluate()"
        file: "src/core/internal-plugins/shell/shell-permissions.mjs"
        description: |
          ShellPermissions.checkPermission() currently calls
          permissionEngine.checkPermission() for each parsed command.
          Change to: this.evaluate() for each command (inherited from base).
          Remove the permissionEngine lookup and the infinite recursion guards.

      - id: "2.4"
        task: "Update other PermissionsClasses"
        description: |
          Check CrossSessionPermissions, SystemCommandPermissions,
          FilesPermissions, WebsearchPermissions — update any that
          reference permissionEngine to use this.evaluate() instead.

      - id: "2.5"
        task: "Update agent-resolver.mjs"
        file: "src/core/scheduling/agent-resolver.mjs"
        description: |
          buildCallbacks() constructs a checkPermission closure that calls
          permissionEngine.checkPermission() directly (including per-command
          shell parsing). This is a duplicate of ShellPermissions logic.

          Options:
          a) Remove the pre-flight permission check entirely — tools now
             handle their own permissions via execute() → _checkPermissions().
             The scheduler doesn't need to pre-check.
          b) If pre-flight is still needed, use Permissions.evaluate() directly.

          Also remove: getPermissionEngine() call, permissionEngine variable.

      - id: "2.6"
        task: "Remove ShellPermissions.checkCommands() static method"
        file: "src/core/internal-plugins/shell/shell-permissions.mjs"
        description: |
          Static checkCommands(commands, permissionEngine, options) takes
          the engine as an explicit parameter. This method is a legacy
          entry point. Remove it — callers should use the instance method
          checkPermission() which now delegates to this.evaluate().

      - id: "2.7"
        task: "Run full test suite, fix failures"
        description: |
          npm test — the 4 pre-existing failures should now be fixed
          because the infinite recursion path is eliminated.
          Also update test files that reference PermissionEngine.

      - id: "2.8"
        task: "Commit"
        description: "feat: wire PluginInterface to Permissions.evaluate(), remove PermissionEngine dependency"

  phase_3:
    name: "Inline Permission Request Cleanup"
    description: |
      NOTE: The inline permission flow already exists in InteractionLoop
      (lines 760-814). Same-session requests already create PermissionRequest
      + ToolResult and continue the loop. hardBreak is already only used for
      cross-session routing.

      This phase cleans up: removes PendingAction from the cross-session
      hardBreak path, verifies the agent gets correct messages, and ensures
      the existing flow works with the new Permissions.evaluate() from Phase 2.
    steps:
      - id: "3.1"
        task: "Verify existing inline flow tests pass with new evaluate()"
        file: "spec/core/interaction/inline-permission-flow-spec.mjs"
        description: |
          This file already exists. Run the tests — they should pass since
          Phase 2 only changed HOW permissions are evaluated, not the
          InteractionLoop catch behavior. If any fail, fix them.

          Add tests if missing:
          - ToolResult content includes frame ID for the permission request
          - Agent receives informative message at each state transition

      - id: "3.2"
        task: "Remove PendingAction from hardBreak path"
        file: "src/core/interaction/permission-handler.mjs"
        description: |
          hardBreak currently creates both PendingAction and PermissionRequest.
          Remove PendingAction frame creation. The PermissionRequest frame
          content already includes toolName, arguments, toolUseID.

          Also remove PendingAction processing from the approve controller
          (interaction-controller.mjs lines 316-326).

      - id: "3.3"
        task: "Run tests, verify"
        description: "Run inline-permission-flow tests + permission-handler tests + full suite"

      - id: "3.4"
        task: "Commit"
        description: "refactor: remove PendingAction from permission flow, PermissionRequest is the single source"

  phase_4:
    name: "Signature-Based Approval"
    description: |
      The approval endpoint signs the approval with the user's Ed25519 key.
      The signature is bound to the specific request (frameID, tool, args, session).
      The PermissionApprovalPlugin verifies the signature before re-executing.
    steps:
      - id: "4.1"
        task: "Write approval signature tests"
        tdd: true
        file: "spec/core/permissions/approval-signature-spec.mjs"
        description: |
          Tests (~12):
          - buildApprovalPayload() includes frameID, toolName, arguments, sessionID
          - signApproval() produces valid Ed25519 signature
          - verifyApproval() returns true for valid signature
          - verifyApproval() returns false for tampered payload
          - verifyApproval() returns false for wrong key
          - Approval with different frameID → verification fails (anti-replay)
          - Approval with different toolName → verification fails (anti-swap)
          - Approval with different arguments → verification fails (anti-escalation)
          - Approval with different sessionID → verification fails (anti-cross-session)
          - Denial signature works the same way (action: 'deny')
          - Signature is written to PermissionRequest frame content
          - Multiple approvals on same request → idempotent

      - id: "4.2"
        task: "Update approval payload format"
        file: "src/core/permissions/permission-service.mjs"
        description: |
          Update _buildApprovalBlob() to include frameID:
            { action: 'approve'|'deny', frameID, toolName, arguments, sessionID }

          Remove PermissionEngine dependency from PermissionService.
          PermissionService becomes a signing/verification utility only.
          Rule creation for standing approvals queries PermissionRule directly.

      - id: "4.3"
        task: "Update interaction controller to sign approvals"
        file: "src/server/controllers/interaction-controller.mjs"
        description: |
          In approve():
            1. Look up user's private key (from auth context or keystore)
            2. Build approval payload: { action, frameID, toolName, arguments, sessionID }
            3. Sign with user's Ed25519 private key
            4. Write signature + fingerprint to PermissionRequest frame:
               frame.content.approvalSignature = signature
               frame.content.approvalFingerprint = fingerprint
               frame.content.approvedBy = userID
            5. Mark frame processed, save
            6. FrameRouter picks it up

          In deny():
            Same signing flow but action = 'deny':
               frame.content.denialSignature = signature
               frame.content.denialFingerprint = fingerprint
               frame.content.deniedBy = userID
               frame.content.denied = true

          For standing rules (allow-forever/deny-forever):
            Query PermissionRule model directly (no permissionEngine).

      - id: "4.4"
        task: "Update PermissionApprovalPlugin to verify signature"
        file: "src/core/internal-plugins/permission-approval/index.mjs"
        description: |
          Before re-executing the tool:
            1. Read approval signature from frame content
            2. Rebuild the expected payload from frame state
            3. Look up approver's public key via fingerprint
            4. Verify signature with Ed25519
            5. If invalid → log warning, set state.step = 'signature-invalid', skip
            6. If valid → proceed with tool re-execution

      - id: "4.5"
        task: "Run tests, verify"
        description: "Run approval-signature-spec + full suite"

      - id: "4.6"
        task: "Commit"
        description: "feat: signature-based approval — cryptographic binding of approval to request"

  phase_5:
    name: "Adversarial & Failure Mode Tests"
    description: |
      Comprehensive testing of attack vectors, timeouts, bad input,
      race conditions, and authorization boundary violations.
    steps:
      - id: "5.1"
        task: "Write adversarial tests"
        tdd: true
        file: "spec/core/permissions/adversarial-permissions-spec.mjs"
        description: |
          Replay attacks (~5):
          - Reuse approval signature from request A on request B → rejected
          - Reuse approval with different arguments → rejected
          - Reuse approval in different session → rejected
          - Reuse approval with different tool → rejected
          - Replay old expired approval → rejected

          Authorization boundary (~5):
          - Agent-signed approval (agent key, not user key) → rejected
          - Unsigned approval (no signature at all) → rejected
          - Approval from non-participant user → rejected
          - State injection (step=completed in DB, no signature) → rejected
          - Forged fingerprint (key fingerprint != actual signer) → rejected

          Failure modes (~5):
          - Tool class unregistered between request and approval → graceful error
          - Double approval (already completed) → idempotent, no re-execution
          - Malformed approval payload (missing fields) → rejected gracefully
          - Permission request frame deleted before approval → 410 error
          - Approval for frame that is not PermissionRequest type → rejected

          Timeouts (~3):
          - Permission request with configurable expiry
          - Expired request → rejection with informative message
          - evaluate() timeout protection (inherited from existing 10s race)

          Race conditions (~2):
          - Two approvals arriving simultaneously → only one executes
          - Standing rule created then revoked between check and execution

      - id: "5.2"
        task: "Implement any missing guards surfaced by tests"
        description: |
          Fix any failures from 5.1 by adding guards:
          - Expiry check on PermissionRequest frames
          - Participant verification on approval endpoint
          - Signature-required guard in PermissionApprovalPlugin
          - Idempotency check (already completed/denied)

      - id: "5.3"
        task: "Run full test suite"
        description: "npm test — ALL tests must pass (including the previously-failing 4)"

      - id: "5.4"
        task: "Commit"
        description: "test: adversarial permission tests — replay, injection, timeout, authorization"

  phase_6:
    name: "Delete PermissionEngine & Cleanup"
    description: |
      Remove PermissionEngine entirely. Clean up all references.
      Simplify PermissionService. Final test pass.
    steps:
      - id: "6.1"
        task: "Delete PermissionEngine and all references"
        description: |
          Delete:
            - src/core/permissions/permission-engine.mjs
            - spec/core/permissions/permission-engine-spec.mjs

          Remove PermissionEngine from:
            - src/core/permissions/index.mjs (re-export)
            - src/core/index.mjs (public API export)
            - src/core/kikx-core.mjs (import, instantiation, context.setProperty, getPermissionEngine() accessor, ClassRegistry registration)
            - src/core/plugin-loader/registry.mjs (if registered)
            - src/core/permissions/permission-denied-error.mjs (comment reference)

          Update test files that import/instantiate PermissionEngine:
            - spec/core/permissions/permission-engine-risklevel-spec.mjs (rewrite for evaluate())
            - spec/core/permissions/permission-service-spec.mjs (remove engine instantiation)
            - spec/core/permissions/permission-service-ed25519-spec.mjs (remove engine)
            - spec/core/permissions/fingerprint-spec.mjs (replace getPermissionEngine())
            - spec/core/routing/base-plugin-permission-spec.mjs (remove engine import)
            - spec/core/plugin-loader/plugin-interface-permissions-spec.mjs (remove 44+ mocks)
            - spec/core/internal-plugins/cross-session/cross-session-permissions-spec.mjs
            - spec/core/internal-plugins/memory-permissions-spec.mjs

      - id: "6.2"
        task: "Simplify PermissionService"
        file: "src/core/permissions/permission-service.mjs"
        description: |
          Remove _permissionEngine from constructor.
          PermissionService is now just signing/verification utilities:
            - signApproval(payload, privateKey)
            - verifyApproval(payload, signature, publicKey)
            - buildApprovalPayload(frameID, toolName, args, sessionID)
          Standing rule creation uses PermissionRule model directly.

      - id: "6.3"
        task: "Remove all permissionEngine references"
        description: |
          grep -r 'permissionEngine\|PermissionEngine' src/ spec/
          Remove or replace every remaining reference.
          Update tests that mock or reference the engine.

      - id: "6.4"
        task: "Run full test suite — all must pass"
        description: "npm test — zero new failures"

      - id: "6.5"
        task: "Commit"
        description: "feat: remove PermissionEngine — all rule evaluation now in Permissions.evaluate()"

  phase_7:
    name: "Integration Verification"
    description: |
      End-to-end verification of the complete permission flow.
    steps:
      - id: "7.1"
        task: "Write end-to-end integration tests"
        file: "spec/core/permissions/permission-integration-spec.mjs"
        description: |
          Full lifecycle tests (~6):
          - Tool → request → user approves → tool executes → result to agent
          - Tool → request → user denies → denial result to agent
          - Tool → standing allow rule → no request needed → tool executes
          - Tool → standing deny rule → PermissionDeniedError → denial frame
          - Cross-session: child agent → parent user approves → child tool executes
          - Agent receives informative message at each step ("Permission required...",
            then actual output or denial)

      - id: "7.2"
        task: "Run full test suite — final verification"
        description: "npm test — ALL tests pass, zero failures"

      - id: "7.3"
        task: "Update DETAILS.md and TODO.md"

      - id: "7.4"
        task: "Commit"
        description: "test: end-to-end permission integration tests"

