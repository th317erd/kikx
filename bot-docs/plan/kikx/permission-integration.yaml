# =============================================================================
# 6. RISK ASSESSMENT
# =============================================================================

risks:
  - risk: "ShellPermissions per-command flow is complex"
    mitigation: "Phase 2.3 specifically addresses this. The per-command loop just calls this.evaluate() instead of permissionEngine.checkPermission()."

  - risk: "Existing approval controller creates rules via permissionEngine.createRule()"
    mitigation: "Phase 4.3 changes to direct PermissionRule model queries. Same SQL, no engine middleman."

  - risk: "User private key may not be available for signing approvals"
    mitigation: "Controller has access to auth context. If no key available, fall back to system signing with user attribution. Log warning."

  - risk: "Cross-session permission routing is complex"
    mitigation: "Cross-session flow is mostly unchanged — hardBreak still handles it. Only same-session changes to inline."

  - risk: "PermissionEngine has utility methods (createRule, deleteRule, getRules, pruneExpired) used by PermissionService and controllers"
    mitigation: "Phase 1.2 moves these into Permissions base class as instance methods. They query PermissionRule model directly. The Ed25519 fingerprinting logic from createRule() moves with it."

  - risk: "Approval blob format change (_buildApprovalBlob now includes frameID) breaks existing standing rules"
    mitigation: "Standing rules use a different mechanism (PermissionRule model with metadata.standing flag) and are not verified via the approval blob. No backward compatibility issue."

  - risk: "agent-resolver.mjs has a parallel permission architecture (duplicate of ShellPermissions logic)"
    mitigation: "Phase 2.5 addresses this. Tools now handle their own permissions via execute() → _checkPermissions(). The scheduler's pre-flight check is redundant and should be removed."
