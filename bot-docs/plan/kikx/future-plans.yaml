# Future Plans
# Items to revisit in subsequent development cycles.

items:
  - id: checkPermission-api-naming
    title: "Rename checkPermission() API for clarity"
    priority: low
    description: |
      Currently checkPermission() returns true = "needs permission" / false = "allowed",
      which is counter-intuitive. A future refactor should rename to something clearer
      (e.g. requiresApproval() or invert to isAllowed()).
    affected_files:
      - src/core/permissions/permission-engine.mjs
      - src/core/interaction/index.mjs
      - src/server/controllers/interaction-controller.mjs
      - spec/core/command-permission-spec.mjs
      - spec/core/interaction-loop-spec.mjs
    added: "2026-03-03"

  - id: sessions-as-frames
    title: "Sessions-as-Frames Unification"
    priority: medium
    status: COMPLETE
    description: |
      Unify sessions and frames into a single data model. Sessions become
      top-level frames with no parent. DMs = 2 participants. Self channels = 1.
      Eliminates SessionManager abstraction, gives fractal nesting for free.
    added: "2026-03-06"

  - id: generator-suspension
    title: "Generator Suspension (Replace Hard-Break)"
    priority: medium
    status: COMPLETE
    description: |
      Replace permission hard-break with true generator suspension. Generator
      suspends (not destroyed) on permission request, resumes on approval.
      No replay needed. Requires generator lifecycle manager and crash recovery.
    added: "2026-03-06"

  - id: general-re-feed-recovery
    title: "General Re-feed Recovery"
    priority: low
    status: ARCHIVED
    description: |
      On session load, feed loaded frames through the router for self-healing.
      Infrastructure already exists (router, plugins, orphan detection).
      Will address if/when a real stuck-frame problem surfaces in production.
    see_also: bot-docs/future-plans/general-re-feed-recovery.yaml
    added: "2026-03-06"

  - id: configurable-plugin-ordering
    title: "Configurable Plugin Ordering"
    priority: low
    description: |
      Allow org owners to configure plugin evaluation order for frame routing.
      Default: installation order (internal first). Includes "handled" flag
      system to stop further routing. Deferred until third-party plugins exist.
    see_also: bot-docs/future-plans/configurable-plugin-ordering.yaml
    added: "2026-03-06"

  - id: abilities-system
    title: "Abilities System"
    priority: medium
    status: COMPLETE
    description: |
      Users customize agent behavior through conversation in any session.
      Agent stores abilities as plain text on config, injected into primer
      and re-injected after context truncation.
    see_also: bot-docs/future-plans/abilities-system.yaml
    added: "2026-03-06"

  - id: signatures-federation
    title: "Signatures & Federation"
    priority: low
    description: |
      Public/private key pairs for identity and authority. Cryptographic
      verification of frame authorship. Foundation for multi-server federation.
      Near-term: ensure frame schema has signature field ready.
    see_also: bot-docs/future-plans/signatures-federation.yaml
    added: "2026-03-06"

  - id: key-rotation
    title: "System Key Rotation"
    priority: medium
    description: |
      Versioned system key pairs with rotation support. Each key has a
      validity window. Compromised keys can be invalidated. Old approvals
      verify against their original key version.
    see_also: bot-docs/future-plans/key-rotation.yaml
    added: "2026-03-07"
