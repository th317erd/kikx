# Future Plans
# Items to revisit in subsequent development cycles.
# Updated: 2026-03-13

items:
  # ===========================================================================
  # COMPLETE
  # ===========================================================================

  - id: sessions-as-frames
    title: "Sessions-as-Frames Unification"
    priority: medium
    status: COMPLETE
    description: |
      Unify sessions and frames into a single data model. Sessions become
      top-level frames with no parent. DMs = 2 participants. Self channels = 1.
      Eliminates SessionManager abstraction, gives fractal nesting for free.
    added: "2026-03-06"

  - id: generator-suspension
    title: "Generator Suspension (Replace Hard-Break)"
    priority: medium
    status: COMPLETE
    description: |
      Replace permission hard-break with true generator suspension. Generator
      suspends (not destroyed) on permission request, resumes on approval.
      No replay needed. Requires generator lifecycle manager and crash recovery.
    added: "2026-03-06"

  - id: inter-agent-streaming
    title: "Inter-Agent Streaming"
    priority: medium
    status: COMPLETE
    completed: "2026-03-10"
    description: |
      Multi-agent sessions with scheduling, streaming, and inter-agent context.
      Agents see each other's responses. FrameRouter scheduling plugin triggers
      secondary agents on user-message commits.
    see_also: bot-docs/future-plans/inter-agent-streaming.yaml

  - id: agent-memory-context
    title: "Agent Memory Context"
    priority: medium
    status: COMPLETE
    completed: "2026-03-11"
    description: |
      Per-actor persisted JSON context stored in DB. Agent config (behaviors,
      preferences) and session context (inheritable through parent chain).
      6 memory tools, 91 tests.
    see_also: bot-docs/future-plans/agent-memory-context.yaml

  - id: agent-deliberation
    title: "Agent Deliberation / Child Sessions"
    priority: high
    status: COMPLETE
    completed: "2026-03-11"
    description: |
      Agents create child sessions for internal deliberation via
      cross-session:createSession tool. Session-link frames in parent,
      maxInteractions constraint, parent context inheritance.
    see_also: bot-docs/future-plans/agent-deliberation.yaml

  - id: behaviors-system
    title: "Behaviors System"
    priority: medium
    status: COMPLETE
    completed: "2026-03-12"
    description: |
      Users customize agent behavior through conversation in any session.
      Agent stores behaviors as plain text on config, injected into primer
      and re-injected after context truncation.
    see_also: bot-docs/future-plans/behaviors-system.yaml
    added: "2026-03-06"

  # ===========================================================================
  # REMAINING — Medium Priority
  # ===========================================================================

  - id: event-driven-rendering
    title: "Event-Driven DOM Rendering via FrameManager"
    priority: high
    status: PLANNED
    description: |
      Refactor client-side rendering to be fully driven by FrameManager events
      (frame:added, frame:updated, frame:phantom). Replace manual rendering
      loops with event-driven DOM projection. Add ghost styling for optimistic
      user messages, phantom frames for streaming, ordered insertion.
    see_also: bot-docs/future-plans/event-driven-rendering.yaml
    added: "2026-03-15"

  - id: ed25519-identity-valuestore-permissions
    title: "Ed25519 Identity + ValueStore + Danger Level Permissions"
    priority: high
    status: IN_PROGRESS
    description: |
      Merged plan: Ed25519 asymmetric key pairs (user + agent + system),
      unified ValueStore (replaces Agent.config, Session.context, adds User settings),
      permission signing migration (HMAC → Ed25519), frame authorship signatures,
      and danger level permissions (strict/normal/permissive).
      SMK (Server Master Key) for actor key encryption.
    see_also:
      - .claude/conversation.md
      - bot-docs/future-plans/value-store.yaml
      - bot-docs/future-plans/danger-level-permissions.yaml
      - bot-docs/future-plans/signatures-federation.yaml
    added: "2026-03-14"

  - id: value-store
    title: "Value Store — Unified Config/Context/Memory Storage"
    priority: high
    status: "IN_PROGRESS (merged into ed25519-identity-valuestore-permissions)"
    description: |
      Replace inline JSON blob columns (Agent.config, Session.context) with a
      dedicated ValueStore table. Key-value store with namespace separation
      (config/context/memory), per-entry Ed25519 signing for tamper detection,
      search capabilities, and scoped storage.
    see_also: bot-docs/future-plans/value-store.yaml
    added: "2026-03-13"
    updated: "2026-03-14"

  - id: danger-level-permissions
    title: "Danger Level Permissions"
    priority: medium
    status: "IN_PROGRESS (merged into ed25519-identity-valuestore-permissions)"
    depends_on: value-store
    description: |
      Per-agent and per-user risk tolerance (Strict / Normal / Permissive YOLO).
      Resolution chain: agent config → user account → 'strict' fallback.
      Tamper-proof via Ed25519 signing.
    see_also: bot-docs/future-plans/danger-level-permissions.yaml
    added: "2026-03-06"
    updated: "2026-03-14"

  - id: device-approval-auth
    title: "Device Approval Auth"
    priority: medium
    description: |
      Two-factor device approval for new logins. Known devices stored per user.
      New device triggers approval flow (email, push, or existing device).
    see_also: bot-docs/future-plans/device-approval-auth.yaml
    added: "2026-03-06"

  - id: key-rotation
    title: "System Key Rotation"
    priority: medium
    description: |
      Versioned system key pairs with rotation support. Each key has a
      validity window. Compromised keys can be invalidated. Old approvals
      verify against their original key version.
    added: "2026-03-07"

  # ===========================================================================
  # REMAINING — Low Priority
  # ===========================================================================

  - id: checkPermission-api-naming
    title: "Rename checkPermission() API for clarity"
    priority: low
    description: |
      Currently checkPermission() returns true = "needs permission" / false = "allowed",
      which is counter-intuitive. Rename to requiresApproval() or invert to isAllowed().
    affected_files:
      - src/core/permissions/permission-engine.mjs
      - src/core/interaction/index.mjs
      - src/server/controllers/interaction-controller.mjs
    added: "2026-03-03"

  - id: applicable-permitters
    title: "Applicable Permitters"
    priority: low
    status: PLANNED
    description: |
      Allow permission rules to specify which users/roles can approve them.
      Currently any authenticated user can approve any permission request.
    see_also: bot-docs/future-plans/applicable-permitters.yaml
    added: "2026-03-06"

  - id: constraint-warnings
    title: "Constraint Warnings"
    priority: low
    status: PLANNED
    description: |
      Warn agents when approaching session constraints (maxInteractions,
      endsAt). Inject warning into context N interactions before limit.
    see_also: bot-docs/future-plans/constraint-warnings.yaml
    added: "2026-03-06"

  - id: configurable-plugin-ordering
    title: "Configurable Plugin Ordering"
    priority: low
    description: |
      Allow org owners to configure plugin evaluation order for frame routing.
      Default: installation order (internal first). Includes "handled" flag
      system to stop further routing. Deferred until third-party plugins exist.
    see_also: bot-docs/future-plans/configurable-plugin-ordering.yaml
    added: "2026-03-06"

  # ===========================================================================
  # DEFERRED — Low Priority, Not Urgent
  # ===========================================================================

  - id: agent-avatar-picker
    title: "Agent Avatar Picker"
    priority: low
    status: DEFERRED
    description: |
      UI for selecting/uploading agent avatars. Currently agents use
      initials fallback via kikx-user-avatar component.
    see_also: bot-docs/future-plans/agent-avatar-picker.yaml

  - id: message-screenshots
    title: "Message Screenshots"
    priority: low
    status: DEFERRED
    description: |
      Allow agents to take screenshots of rendered messages or web pages
      for visual context in conversations.
    see_also: bot-docs/future-plans/message-screenshots.yaml

  - id: rich-content-renderers
    title: "Rich Content Renderers"
    priority: low
    status: DEFERRED
    description: |
      Pluggable renderers for rich content types (charts, tables, code blocks
      with syntax highlighting, image galleries, etc.).
    see_also: bot-docs/future-plans/rich-content-renderers.yaml

  - id: signatures-federation
    title: "Signatures & Federation"
    priority: low
    status: "PARTIAL (key pairs + frame signatures pulled into ed25519-identity-valuestore-permissions; federation protocol remains DEFERRED)"
    description: |
      Public/private key pairs for identity and authority. Cryptographic
      verification of frame authorship. Foundation for multi-server federation.
      Key pairs and frame signatures are being implemented now. Federation
      protocol and two-layer envelopes remain deferred.
    see_also: bot-docs/future-plans/signatures-federation.yaml
    added: "2026-03-06"
    updated: "2026-03-14"

  - id: plugin-model-registry
    title: "Plugin Model Registry + Token-Aware Truncation"
    priority: high
    status: PLANNED
    description: |
      Plugins expose getModels() with context windows, pricing, and token
      estimation. Truncation moves into the plugin (plugin.truncate()).
      New GET /api/v2/models endpoint for client. Model selector UI in
      agent config. cost.mjs uses plugin pricing.
    see_also: bot-docs/future-plans/plugin-model-registry.yaml
    added: "2026-03-19"

  - id: tool-log
    title: "Tool Log — Persistent Tool Output Storage"
    priority: high
    status: PLANNED
    description: |
      All tool outputs stored in ValueStore (namespace: tool_log).
      Outputs <= 1024 chars also delivered inline; larger outputs
      replaced with pointer message. New tools: tool_log:get and
      tool_log:search with range slicing.
    see_also: bot-docs/future-plans/tool-log.yaml
    added: "2026-03-19"

  - id: frame-search
    title: "Frame / Conversation Search Tool"
    priority: high
    status: PLANNED
    description: |
      New internal tool frame:search for agents to query conversation
      history with before/after frame anchors and pagination.
      Prerequisite for compaction.
    see_also: bot-docs/future-plans/frame-search.yaml
    added: "2026-03-19"

  - id: compaction
    title: "Rolling Compaction"
    priority: high
    status: PLANNED
    description: |
      Background AI-driven compression of session history by the
      coordinator agent. Non-blocking, cluster-safe DB lock, special
      compaction frame type, user messages pass through during
      compaction, /compact command for manual trigger.
    see_also: bot-docs/future-plans/compaction.yaml
    added: "2026-03-19"

  - id: session-encryption-vault
    title: "Session-Level Encryption Vault"
    priority: medium
    status: FUTURE
    description: |
      Per-session symmetric encryption keys wrapped per-participant (X25519 from
      Ed25519 identity). Server stores wrapped keys only; decryption happens
      client-side or in the agent runtime. Covers frames, ValueStore entries,
      tool_log, and all other sensitive session content.
      Deferred: tool_log currently stores plaintext; this plan hardens the posture.
    see_also: bot-docs/future-plans/session-encryption-vault.yaml
    added: "2026-03-19"

  # ===========================================================================
  # ARCHIVED
  # ===========================================================================

  - id: general-re-feed-recovery
    title: "General Re-feed Recovery"
    priority: low
    status: ARCHIVED
    description: |
      On session load, feed loaded frames through the router for self-healing.
      Infrastructure already exists (router, plugins, orphan detection).
      Will address if/when a real stuck-frame problem surfaces in production.
    see_also: bot-docs/future-plans/general-re-feed-recovery.yaml
    added: "2026-03-06"
