# =============================================================================
# FUTURE PLANS: SERVER-SIDE SECURITY
# =============================================================================
# These are security concerns that live ABOVE the FrameManager, at the server
# layer. The FrameManager is a pure data structure — it doesn't know about
# users, sessions, or authentication. These items are documented here so they
# aren't forgotten, but they are NOT part of the FrameManager implementation.

future-server-security:
  description: |
    The FrameManager enforces data invariants (silent rejection of invalid
    input). The SERVER enforces identity and authorization. These are the
    server-side security concerns that must be addressed when the server
    layer is built.

  authentication:
    - topic: Permission grant authentication
      description: |
        Allow frames (permission-grant type) must be authenticated before
        the server passes them to FrameManager.merge(). The server must
        verify: (1) the submitting user has sufficient privilege level,
        (2) the permission prompt was actually issued to that user,
        (3) the allow frame targets a real permission prompt frame.
        The FrameManager just sees a valid merge — the server decides
        whether to call merge() at all.
    - topic: Agent identity verification
      description: |
        Frames submitted by agents must be verified as coming from a
        legitimate agent session. Agents should not be able to forge
        frames as other agents or as users.
    - topic: User identity verification
      description: |
        Frames submitted by users must be tied to an authenticated session.
        A user should not be able to submit frames as another user.

  authorization:
    - topic: Permission prompt visibility
      description: |
        Permission prompts should only be visible to users with sufficient
        privilege level. The server filters which frames are sent to which
        clients via SSE. The FrameManager doesn't filter — it stores
        everything. Visibility filtering is a server/API concern.
    - topic: Channel membership
      description: |
        Users should only be able to submit frames to channels they are
        members of. The server validates channel membership before calling
        FrameManager.merge().
    - topic: Frame type authorization
      description: |
        Certain frame types may require specific roles or permissions.
        For example, only system/server should be able to create
        permission-prompt frames. Only authenticated users should be
        able to create permission-grant frames. Agents should not be
        able to emit permission-grant frames.

  replay-prevention:
    - topic: Permission grant replay attack
      description: |
        The same allow frame should not be accepted twice. The server uses
        processed/processedAt to track which permission prompts have been
        resolved. A second allow frame targeting an already-processed
        prompt should be rejected by the server before reaching the
        FrameManager.
    - topic: Frame deduplication
      description: |
        The server should detect and reject duplicate frame submissions
        (same frame ID submitted twice by a client). The FrameManager
        treats duplicate IDs as updates (frame correction), so the server
        must decide whether a duplicate is intentional correction or replay.

  rate-limiting:
    - topic: Merge rate limiting
      description: |
        Clients should be rate-limited on frame submissions to prevent
        resource exhaustion. This is especially important for phantom
        frames (streaming) where a malicious client could flood the
        server with phantoms.
    - topic: Content size limits
      description: |
        The server should enforce maximum content sizes before passing
        frames to the FrameManager. The FrameManager itself doesn't
        limit content size (it's a data structure), but the server
        should reject oversized payloads at the API boundary.
