claude_md_additions:
  section: "FrameManager — The Single Source of Truth"
  content: |
    ## ⚠️ FrameManager — The Single Source of Truth ⚠️

    **ALL frame mutations MUST go through FrameManager.merge().** No exceptions.

    The chain: merge() → commit event → SSE broadcast → FrameRouter → DB persist

    ### NEVER do this:
    ```javascript
    // ❌ WRONG — bypasses FrameManager, breaks SSE + Router
    frame.hidden = true;
    await frame.save();

    // ❌ WRONG — bypasses FrameManager
    frame.content = JSON.stringify(newContent);
    await frame.save();

    // ❌ WRONG — fabricated commit, not from FrameManager
    interactionLoop.emit('commit', { sessionID, commit: { ... } });

    // ❌ WRONG — direct DB update
    framePersistence.updateFrameState(frameID, newState);
    ```

    ### ALWAYS do this:
    ```javascript
    // ✅ CORRECT — use InteractionLoop.updateFrame()
    let interactionLoop = context.getProperty('interactionLoop');
    await interactionLoop.updateFrame(sessionID, {
      id: frameID,
      hidden: true,
      content: newContent,
    });
    ```

    updateFrame() is the ONLY blessed path for frame mutations outside
    of InteractionLoop._createFrame(). It handles: hydration of partial
    updates, FrameManager.merge(), persistence, SSE broadcast, and
    commit event emission. Do NOT roll your own version.

    ### Why this matters:
    - SSE won't broadcast if you bypass FrameManager
    - FrameRouter won't fire plugins if you bypass FrameManager
    - Commit history is lost if you bypass FrameManager
    - Client and server state diverge if you bypass FrameManager

    **If you need to modify a frame and FrameManager isn't loaded: LOAD IT.**
    **If you think "this is just a simple update": IT'S NOT. USE FRAMEMANAGER.**

    This rule exists because we repeatedly bypassed FrameManager with "quick
    fixes" that broke SSE broadcasts, FrameRouter plugins, and state consistency.
    Every time we patched a bypass with another bypass, we made it worse.
    Never again.

    ### Context — Why This Rule Is Here

    This is not a performance system. Kikx is an agentic, encrypted, asynchronous,
    fully plugin-capable messaging system. **Stability, recoverability, and security
    are the goals. Not performance.** Do not make "performance" decisions that
    compromise the architectural integrity of the FrameManager.

    We have documented plans. We have mandates. We have a startup file with
    engineering standards. FOLLOW THEM. Do not deviate from plans and discussions
    unless mutual agreement dictates you do. Every shortcut creates more work later.
    Every bypass creates a new bug. Every "quick fix" that skips FrameManager costs
    hours of debugging.

    **TEST YOUR WORK.** Unit tests AND E2E verification. Every time. "It looks right"
    is not proof. Tests that pass are proof. Never say "done" without evidence.