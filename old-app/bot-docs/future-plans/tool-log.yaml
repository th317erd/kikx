  - src/core/interaction/tool-log-service.mjs
  - src/core/internal-plugins/tool-log/index.mjs
  - spec/core/interaction/tool-log-interception-spec.mjs
  - spec/core/internal-plugins/tool-log-spec.mjs

files_modified:
  - src/core/models/value-store-model.mjs
  - src/core/interaction/index.mjs
  - src/core/routing/base-plugin-class.mjs (register tool-log plugin)
  - spec/core/models/value-store-spec.mjs

dependencies:
  - plugin-model-registry (plugin.truncate() needed for tool-result handling)

build_order_note: >
  Build after plugin-model-registry. Step 1 (ValueStore schema) can be done
  in parallel with plugin-model-registry. Steps 2-5 require the schema.
