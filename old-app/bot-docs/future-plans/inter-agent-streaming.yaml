# Inter-Agent Streaming
# Status: IMPLEMENTED (V2)
# Implemented: 2026-03-10
# Priority: Medium
# Complexity: High

summary: >
  Multi-agent streaming support across same-session and cross-session
  interactions. Per-agent streaming identity in SSE events, cross-session
  delta relaying, and multi-agent typing indicators on the client.

implemented:
  phase_1_streaming_identity:
    description: >
      Agent identity propagated through all SSE events. interaction:start,
      interaction:end, delta, and reflection-delta all carry agentID and
      author attribution.
    files:
      - src/core/interaction/index.mjs                 # agentID in interaction:start
      - src/server/controllers/stream-controller.mjs   # Agent identity in all SSE events
      - src/server/controllers/controller-base.mjs     # getStreamRelay() accessor

  phase_2_same_session:
    description: >
      Client tracks per-agent streaming state via Map-based _agentStreams.
      Multiple typing indicators, delta routing by authorID, per-agent
      display name lookup from session participants.
    files:
      - src/client/components/kikx-session-page/kikx-session-page.mjs

  phase_3_cross_session:
    description: >
      StreamRelay class forwards delta events from target sessions back to
      source sessions. Wired into PostToSessionTool for automatic relay
      creation, and into StreamController for SSE event forwarding.
    files:
      - src/core/scheduling/stream-relay.mjs           # NEW — EventEmitter relay
      - src/core/internal-plugins/cross-session/index.mjs  # createRelay on postToSession
      - src/server/controllers/stream-controller.mjs   # relay:delta SSE events

related:
  - agent-deliberation.yaml  # Uses streaming identity + relay as prerequisites

tests:
  - spec/core/interaction/streaming-identity-spec.mjs   # 7 tests
  - spec/server/controllers/stream-controller-spec.mjs  # +6 tests
  - spec/client/multi-agent-streaming-spec.mjs          # 15 tests
  - spec/core/scheduling/stream-relay-spec.mjs          # 25 tests
