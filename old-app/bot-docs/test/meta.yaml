      in message frame. Client renders WebComponents."

  - assert: "Prompt state tracked via FrameManager (targeting/merge)"
    severity: blocker
    status: pass
    notes: >
      server-plan.yaml section 13 state_management: mechanism "FrameManager
      deep-merge" with 7-step flow. Server creates prompt-response frame
      targeting original. FrameManager deep-merges. Survives reload.

  - assert: "Select child element approach is specified (choice between two options)"
    severity: high
    status: pass
    notes: >
      server-plan.yaml section 13 child_elements: approach "CHOICE between two
      options (not both)". option_a: kikx-hml-option child elements. option_b:
      reuse radio/checkbox types for select rendering. note: "These are
      alternatives, NOT nested within each other."

  - assert: "kikx-hml-prompt-value is dropped (one component, two modes)"
    severity: high
    status: pass
    notes: >
      server-plan.yaml section 13 reload_behavior: "Single component
      (kikx-hml-prompt) handles both interactive and read-only modes -- mode
      determined by value presence in merged frame content." NOTE: client-plan.yaml
      still lists kikx-hml-prompt-value as a separate component -- client plan
      needs updating to match server plan.

  - assert: "Binary fields (checkbox) ALWAYS include their answer (true/false)"
    severity: medium
    status: pass
    notes: >
      server-plan.yaml section 13: binary_fields "Checkbox always has a default
      -- ALWAYS include the answer (true/false)".

  - assert: "Prompt submit flow is fully specified (7 steps)"
    severity: high
    status: pass
    notes: >
      server-plan.yaml section 13 state_management flow has 7 steps: fill
      prompts, click submit, collect values (with defaults/null), send to server,
      server creates prompt-response frame, server sends values as new user
      message to agent, new interaction starts.

  - assert: "Three prompt render states are defined (unanswered, answered, dismissed)"
    severity: medium
    status: pass
    notes: >
      server-plan.yaml section 13 render_modes: unanswered (interactive form
      fields), answered (green-success read-only pill badge), dismissed (muted
      'User refused to answer').

