  - assert: "Context provides registerCommand(), registerTool(), PluginInterface"
    severity: high
    status: pass
    notes: >
      server-plan.yaml section 4 context_provides lists all three:
      registerCommand(), registerTool(), PluginInterface.

  - assert: "Static metadata fields are defined on PluginInterface"
    severity: medium
    status: pass
    notes: >
      server-plan.yaml section 4 static_metadata: pluginId, featureName,
      displayName, description, icon, version.

  - assert: "Launch plugins are enumerated (claude-agent, websearch, bash, delegate, help, reload)"
    severity: high
    status: pass
    notes: >
      server-plan.yaml section 26 lists 6 launch plugins:
      claude-agent, websearch, bash, delegate, help, reload. HML plugin
