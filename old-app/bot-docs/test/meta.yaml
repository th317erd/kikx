      setup() -- not a separate method". Classes inside setup().

  - assert: "PluginProvider interface with discover/load/watch/unwatch is defined"
    severity: blocker
    status: pass
    notes: >
      server-plan.yaml section 5: base_class PluginProvider, methods discover,
      load, watch, unwatch. Three providers: FilesystemPluginProvider (phase 1),
      NpmPluginProvider (phase 3), InMemoryPluginProvider (phase 1).

  - assert: "Plugin conflict resolution is specified (implicit override + warning)"
    severity: high
    status: pass
    notes: >
      server-plan.yaml section 4 conflicts: behavior "Implicit override with
      warning (not error)", rationale "Allows plugins to upgrade/overload other
      plugins". NOTE: assertion notes mention "error at registration" from Round
      12 but the final plan says "implicit override with warning" -- the plan
