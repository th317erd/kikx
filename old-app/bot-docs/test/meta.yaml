# =============================================================================
# bot-docs/test/meta.yaml
# AGIS Plan Test Assertions — Kikx V2 Server Architecture
# =============================================================================
# These are assertions about the PLAN itself — not code tests.
# They validate completeness, coherence, conflicts, and implementation readiness.
#
# Severity: blocker | high | medium | low
# Status:   pending | pass | fail | needs-clarification | blocked
#
# Sources:
#   - bot-docs/plan/kikx/server-plan.yaml (Rounds 1-19)
#   - .claude/DETAILS.md (Rounds 9-12 decisions)
#   - .claude/conversation2.md (Rounds 13-19 decisions)
#   - bot-docs/plan/kikx/frame-manager.yaml
#   - bot-docs/plan/kikx/client-plan.yaml
#
# Updated: 2026-02-28
# Evaluated by: Claude Opus 4.6
# =============================================================================

# =============================================================================
# 1. CORE ARCHITECTURE
# =============================================================================

core-architecture:

  - assert: "Embeddable core (src/core/) has zero HTTP dependencies"
    severity: blocker
    status: pass
    notes: >
      server-plan.yaml section 1: "Embeddable engine with zero HTTP dependencies.
      Can run without Express/Mythix server."

  - assert: "Thin Mythix server wrapper (src/server/) delegates everything to core"
    severity: blocker
    status: pass
    notes: >
      server-plan.yaml section 1: "Thin Mythix wrapper that delegates everything
      to core. HTTP routes are just adapters that call core methods."

  - assert: "createKikxCore(config) entry point is defined with return type"
    severity: blocker
    status: pass
    notes: >
      server-plan.yaml section 1: entry_point "createKikxCore(config)", returns
      "Core instance with full plugin/session/interaction capabilities".
      Config schema itself is not documented in detail but the entry point
      and return type are specified.

  - assert: "Directory structure is fully specified for src/core/ and src/server/"
    severity: high
    status: pass
    notes: >
      server-plan.yaml section 2 has complete directory tree for both src/core/
      (with 13 subdirectories/files) and src/server/ (with app, routes, middleware).

  - assert: "All 10 kernel components have assigned levels (core vs server)"
    severity: high
    status: needs-clarification
    notes: >
      All 10 components have explicit level assignments in section 3. HOWEVER,
      Auth System is listed as level:server in kernel_components (section 3) and
      section 19, but the directory structure (section 2) places 'auth' under
      src/core/ with description "Authentication (core-level, not HTTP-level)".
      This is contradictory — auth straddles both levels without a clear boundary.

  - assert: "Cascading context mechanism (Object.create chain) is specified"
    severity: high
    status: pass
    notes: >
      server-plan.yaml section 23: Object.create() prototype chain with 4 layers
      (Plugin defaults, Org config, Session state, Runtime state). API:
      setProperty/getProperty with dot and array notation.

  - assert: "FrameManager location resolved (src/core/frame-manager/)"
    severity: medium
    status: pass
    notes: >
      server-plan.yaml section 1 frame_manager: location "src/core/frame-manager/",
      note "Moved from src/shared/frame-manager/ -- single source of truth",
      shared: true.

# =============================================================================
# 2. DATA LAYER
# =============================================================================

data-layer:

  - assert: "Mythix ORM is the sole data abstraction (no StorageAdapter)"
    severity: blocker
    status: pass
    notes: >
      server-plan.yaml section 20: "NO StorageAdapter interface. Mythix ORM IS
      the abstraction layer. Removed entirely from architecture."

  - assert: "Configurable ORM driver with default mythix-orm-sqlite in-memory"
    severity: high
    status: pass
    notes: >
      server-plan.yaml section 20: driver_model "Configurable", default_driver
      package "mythix-orm-sqlite", mode "In-memory by default".

  - assert: "Models are always accessed from context, never direct imports"
    severity: blocker
    status: pass
    notes: >
      server-plan.yaml section 20: access "NEVER import models directly --
      always get from application context". overridable "Models exported and
      overridable via config".

  - assert: "Model versioning strategy is defined (static property, no migration files)"
    severity: high
    status: pass
    notes: >
      server-plan.yaml section 20: versioning "Models versioned as static property.
      Caller manages schema." migrations "No migration files in core -- external
      migration system."

  - assert: "Frame persistence and FrameManager integration are specified"
    severity: blocker
    status: pass
    notes: >
      Directory structure has src/core/frames/ for "Frame persistence -- DB sync".
      Frame schema fully defined in section 14. FrameManager integration via
      merge() API documented in frame-manager.yaml.

  - assert: "Frame schema columns are fully specified with types and notes"
    severity: high
    status: pass
    notes: >
      server-plan.yaml section 14 defines 19 columns (not 18 as originally
      counted): id, session_id, interaction_id, parent_id, order, group_id,
      group_type, type, content, targets, author_type, author_id, hidden,
      deleted, processed, processed_at, timestamp, created_at, updated_at.
      All have types and relevant notes.

  - assert: "Session manager CRUD + participant binding are specified"
    severity: high
    status: pass
    notes: >
      Kernel component #8: "CRUD, participants, FrameManager instances per
      session." Data model section 22: session has participants. Client plan
      specifies full session CRUD API endpoints.

  - assert: "Data model entities are complete (org, user, role, agent, session)"
    severity: high
    status: pass
    notes: >
      server-plan.yaml section 22: organization (top-level tenant), user
      (belongs_to org), role (org-level), agent (org-level configured instance),
      session (has participants, contains FrameManager instance). Multi-tenant
      from day one.

  - assert: "Loading strategy for frames is specified (denormalized interaction_id)"
    severity: medium
    status: pass
    notes: >
      server-plan.yaml section 14 loading_strategy: "Single-query loading:
      subquery for top-level IDs, then all by interaction_id. Denormalized
      interaction_id makes this efficient."

