# =============================================================================
# 4. INTERACTION LOOP
# =============================================================================

interaction-loop:

  - assert: "Async generator pattern for interaction loop is specified"
    severity: blocker
    status: pass
    notes: >
      server-plan.yaml section 6: pattern "Async generator", agent plugin is
      async generator yielding blocks, kernel iterates, tool results passed
      back via yield protocol.

  - assert: "Interaction flow steps are defined (yield -> process -> next)"
    severity: high
    status: pass
    notes: >
      server-plan.yaml section 6 flow: 5 steps (agent yields block, kernel
      receives, kernel processes, kernel sends result via next(), generator
      yields next or returns).

  - assert: "Permission hard-break (deliberate gap at permission boundary) is specified"
    severity: blocker
    status: pass
    notes: >
      server-plan.yaml section 6 permission_hard_break: 9-step flow. Generator
      destroyed (no suspended state). Pending action persisted as frame.
      New interaction starts with full history after approval. processed_flag
      distinguishes old from new frames.

  - assert: "Queue + cancel UX for concurrent interactions is specified"
    severity: high
    status: pass
    notes: >
      server-plan.yaml section 6 queue_and_cancel: queue_behavior (messages
      concatenate), on_natural_completion (auto-send), on_cancel (placed in
      input field, user text appended, editable).

  - assert: "Interaction resumability mechanism is specified (replay-from-frames)"
    severity: blocker
    status: fail
    notes: >
      FAIL: The plan addresses permission hard-break (generator destroyed, new
      interaction with full history) which handles the permission case. But there
      is NO explicit "replay-from-frames" or "resume mode" mechanism for general
      server restart scenarios. Build phase 3 step 23 lists "Interaction
      resumability enhancements" but provides zero detail on what this means or
      how it works. The mechanism is deferred without specification. For a
      blocker-severity item, this is insufficient.

  - assert: "prepareMessage hook is specified as single interceptor"
    severity: high
    status: pass
    notes: >
      server-plan.yaml section 12: signature "prepareMessage({ source, target,
      message, context })", actions (pass through, modify, block, redirect).
      Replaces BEFORE_TOOL/AFTER_TOOL.

# =============================================================================
# 5. SECURITY (ZERO-KNOWLEDGE)
# =============================================================================

security-zero-knowledge:

  - assert: "JWT-as-vault architecture is specified (UMK wrapped by REK)"
    severity: blocker
    status: pass
    notes: >
      server-plan.yaml section 18: architecture "Zero-knowledge JWT-as-Vault".
      UMK wrapped by REK, stored in JWT vault claim. Per-user keys via HMAC.

  - assert: "REK lifecycle is specified (random in prod, deterministic in dev)"
    severity: blocker
    status: pass
    notes: >
      server-plan.yaml section 18 rek: random 32-byte, process memory only,
      never on disk. restart_behavior: all sessions die. dev_mode: deterministic
      REK from project path + fixed salt.

  - assert: "Password-only auth at launch (WebAuthn deferred)"
    severity: high
    status: pass
    notes: >
      server-plan.yaml section 19: "Password-only for now". deferred list
      includes WebAuthn/passkeys, passphrase-based auth, device approval.

  - assert: "No magic links (incompatible with zero-knowledge)"
    severity: high
    status: pass
    notes: >
      server-plan.yaml section 19 not_supported: "Magic links (incompatible
      with zero-knowledge)" and "Server slot (eliminated)".

  - assert: "Lazy decryption via getUMK() accessor is specified"
    severity: high
    status: pass
    notes: >
      server-plan.yaml section 18 umk: access "Lazy decryption via getUMK()
      accessor on request", sandboxing "UMK NEVER reaches plugin _execute()".

  - assert: "Permission fingerprinting via HMAC from UMK-derived secret is specified"
    severity: high
    status: pass
    notes: >
      server-plan.yaml section 17 fingerprinting and section 18 per_user_keys:
      derivation "HMAC from UMK + userId", uses include "Permission fingerprints"
      and "API key encryption".

  - assert: "Encryption algorithms are specified (AES-256-GCM, HMAC-SHA256)"
    severity: high
    status: pass
    notes: >
      server-plan.yaml section 18 module: algorithms encryption "AES-256-GCM",
      fingerprinting "HMAC-SHA256", password_kdf "scrypt". destroy() method
      specified.

  - assert: "Multi-key vault (multiple master keys unlock same vault) is specified"
    severity: medium
    status: pass
    notes: >
      server-plan.yaml section 18 vault_slots: "Multiple slots can independently
      wrap the same UMK". Password slot mechanism detailed. Future slots listed
      (passphrase, device approval).

  - assert: "Auth is server-level, keystore is core-level (boundary is clear)"
    severity: high
    status: fail
    notes: >
      FAIL: The plan contradicts itself. Section 19 says auth level: server.
      Kernel component "Auth System" says level: server with description "JWT
      tokens, password auth, cookies". BUT directory structure section 2 places
      'auth' under src/core/ with description "Authentication (core-level, not
      HTTP-level)". The boundary is NOT clear — the plan puts auth in two
      different levels simultaneously.

