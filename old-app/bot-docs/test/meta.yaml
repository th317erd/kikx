# =============================================================================
# 14. FRAME MANAGER (from existing assertions)
# =============================================================================

frame-manager:

  - assert: "FrameManager has complete acceptance criteria"
    severity: blocker
    status: pass
    notes: >
      frame-manager.yaml acceptance-criteria section: 27 functional + 9
      validation + 8 testing = 44 concrete acceptance criteria.

  - assert: "FrameManager has four-tier test strategy"
    severity: blocker
    status: pass
    notes: >
      frame-manager.yaml testing-architecture: Tier 1 (unit tests), Tier 2
      (composition scenarios S1-S11), Tier 3 (test utilities: EventRecorder,
      HistoryWalker, IntegrityChecker, ScenarioBuilder), Tier 4 (adversarial
      tests H1-H22). IntegrityChecker after every scenario.

  - assert: "Merge semantics are fully specified (4-rule deep merge)"
    severity: blocker
    status: pass
    notes: >
      frame-manager.yaml merge section: 4 ordered rules (null->delete,
      array->replace, plain object->recurse, otherwise->replace). Mergeable
      whitelist: hidden, deleted, updatedAt, content. Empty objects valid.
      Nested example provided.

  - assert: "Live frame (phantom) model is coherent"
    severity: blocker
    status: pass
    notes: >
      frame-manager.yaml live-frames: immediate collapse. Group frame
      id=groupId, type=groupType, content from first phantom, phantom=false,
      hidden=true, deleted=false. groupType conflict = reject. Standalone
      phantoms (no groupId) legal for typing indicators etc.

  - assert: "FramePointer design decouples version history from Frame objects"
    severity: blocker
    status: pass
    notes: >
      frame-manager.yaml frame-pointer: separate object with frame/previous/
      next/head/tail. Multiple pointers reference same Frame independently.
      In-memory only. Solves multi-target version history.

  - assert: "FrameManager seqda integration is specified"
    severity: high
    status: pass
    notes: >
      frame-manager.yaml seqda-foundation: light wrapper around seqda store.
      seqda doesn't freeze referenced objects. hydrate() cache bug fixed in
      v2.1.0. Author-owned, extensible. Event strategy via seqda update events
      re-emitted as namespaced frame events.

  - assert: "FrameManager event system supports namespaced ID-scoped subscriptions"
    severity: high
    status: pass
    notes: >
      frame-manager.yaml events: frame:updated:{frameId} pattern. Helper
      methods that translate three-arg on(eventType, frameId, callback) to
      two-arg namespaced form. Event vocabulary: frame:added, frame:updated,
      frame:processed, frames:bulk-loaded (all with namespaced variants).

  - assert: "FrameManager validation posture is defined (silent rejection)"
    severity: blocker
    status: pass
    notes: >
      frame-manager.yaml validation-posture: no id -> drop, no type -> drop,
      non-mergeable -> strip, client processed/processedAt -> strip, self-ref
      targets -> drop, duplicate targets -> dedup, non-array merge() -> error,
      groupType conflicts -> reject with warning.

  - assert: "FrameManager is implementation-ready"
    severity: blocker
    status: pass
    notes: >
      All questions resolved (20 resolved items + 20 critical review items).
      Pre-work specified (seqda exploration). 9 implementation phases with
